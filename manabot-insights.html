function renderCategorize() {
  // Auto-assign uncategorized cards to SA categories based on Step 2 definitions
  autoAssignSACategories();

  const app = $('#app');
  const container = el('div', { className: 'fade-in' });
  const cs = STATE.characterSheet;

  container.appendChild(el('h2', { className: 'font-cinzel text-2xl text-mtg-gold mb-2' }, ['Card Categorization']));

  // AI Auto-Fill banner
  const uncatCount = STATE.parsedCards.filter(c => {
    if (c.isCommander) return false;
    const cat = STATE.categories[c.name];
    return !cat?.primary || cat.primary === '';
  }).length;
  const aiFillBox = el('div', { className: 'mb-4 p-4 rounded-lg border border-mtg-gold/40 bg-mtg-gold/5 flex flex-col sm:flex-row items-start sm:items-center gap-3 justify-between' });
  const aiFillInfo = el('div');
  aiFillInfo.appendChild(el('div', { className: 'text-sm font-semibold text-mtg-gold' }, ['AI Auto-Categorize']));
  aiFillInfo.appendChild(el('div', { className: 'text-xs text-mtg-dim' }, [
    uncatCount > 0
      ? `${uncatCount} card${uncatCount === 1 ? '' : 's'} still uncategorized. The engine uses your commander's signals to assign cards intelligently.`
      : 'All cards categorized! Click to re-run if you changed SA names.'
  ]));
  aiFillBox.appendChild(aiFillInfo);
  const aiFillBtn = el('button', {
    className: 'px-4 py-2 rounded bg-mtg-gold text-mtg-dark font-semibold hover:bg-mtg-accent transition text-sm whitespace-nowrap',
    onClick: () => {
      // Clear non-user-edited categories and re-run
      STATE.parsedCards.forEach(c => {
        if (!c.isCommander && !STATE.userEdited[c.name]) {
          delete STATE.categories[c.name];
        }
      });
      autoAssignSACategories();
      render();
    }
  }, ['Re-run AI Fill']);
  aiFillBox.appendChild(aiFillBtn);
  container.appendChild(aiFillBox);

  container.appendChild(el('p', { className: 'text-mtg-dim text-sm mb-4' }, ['Auto-filled from deck analysis. Review and adjust — click any card name to see the full card.']));

  container.appendChild(makeInfoBox(
    'Guide: Categorizing Your Cards',
    'Manabot Insights splits your 99 into strict category ratios backed by hypergeometric probability. Velocity (card draw) at 18 ensures you see 1+ draw spells per opening hand. Ramp at 12-15 keeps you on curve. Interaction at 9-15 gives you answers without drowning in reactive cards. Your 5 Secondary Abilities fill the remaining slots with cards that directly support your strategy. Every card must have a role — uncategorized cards are the #1 indicator of deck unfocus.',
    'Most cards are auto-categorized from oracle text analysis. Review the auto-fill and adjust where needed — the tool catches obvious Ramp/Velocity/Interaction, but you know your deck\'s context better. Give every card a primary category. For dual-purpose cards (e.g., a ramp spell that also creates tokens), set a secondary category too — these "bridge cards" are what make a deck feel interconnected. Watch the ratio dashboard at the top for real-time feedback.',
    'A fully categorized deck unlocks the Cross-Category Pollination metric in Step 5. Cards with both primary and secondary categories automatically score a point on the Dual-Category finger in Step 4. The ratio dashboard tells you exactly where your deck is over- or under-invested.'
  ));

  // SA Legend — only show SAs that have names defined
  const legend = el('div', { className: 'flex flex-wrap gap-2 mb-4' });
  CATEGORIES.filter(c => c !== 'Land').forEach(cat => {
    // Skip unnamed SAs in the legend
    if (cat.startsWith('SA-') && !cs.saNames[parseInt(cat.split('-')[1])-1]) return;
    const label = catDisplayName(cat);
    legend.appendChild(el('span', { className: 'cat-pill', style: `background:${CAT_COLORS[cat]}22; color:${CAT_COLORS[cat]}; border:1px solid ${CAT_COLORS[cat]}44` }, [label]));
  });
  container.appendChild(legend);

  // Ratio Dashboard — bracket-aware targets
  const counts = calcCategoryCounts();
  const profile = getProfile();
  const landRec = recommendedLands();
  const targets = {
    Velocity: `${profile.velocity[0]}-${profile.velocity[1]}`,
    Ramp: `${profile.ramp[0]}-${profile.ramp[1]}`,
    Interaction: `${profile.interaction[0]}-${profile.interaction[1]}`,
    Wipe: `${profile.wipe[0]}-${profile.wipe[1]}`,
    Land: `${profile.lands[0]}-${profile.lands[1]}`
  };
  const ratioBar = el('div', { className: 'ratio-grid grid grid-cols-3 sm:grid-cols-5 gap-2 mb-4 p-3 rounded-lg bg-mtg-panel border border-mtg-border' });
  const bracketMins = {
    Velocity: profile.velocity[0], Ramp: profile.ramp[0],
    Interaction: profile.interaction[0], Wipe: profile.wipe[0], Land: profile.lands[0]
  };
  const bracketMaxes = {
    Velocity: profile.velocity[1], Ramp: profile.ramp[1],
    Interaction: profile.interaction[1], Wipe: profile.wipe[1], Land: profile.lands[1]
  };
  ['Velocity','Ramp','Interaction','Wipe','Land'].forEach(cat => {
    const t = targets[cat];
    const min = bracketMins[cat];
    const max = bracketMaxes[cat];
    const count = counts[cat];
    const isLow = count < min;
    const isHigh = count > max;
    const colorCls = isLow ? 'text-red-400' : isHigh ? 'text-yellow-400' : 'text-green-400';
    ratioBar.appendChild(el('div', { className: 'text-center' }, [
      el('div', { className: 'text-xs text-mtg-dim' }, [cat]),
      el('div', { className: `text-lg font-bold ${colorCls}` }, [String(count)]),
      el('div', { className: 'text-xs text-mtg-dim' }, [`target: ${t}`])
    ]));
  });
  container.appendChild(ratioBar);

  // Smart land recommendation
  if (STATE.characterSheet.bracket) {
    const landRec = recommendedLands();
    const currentLands = counts['Land'] || 0;
    const landDiff = currentLands - landRec.recommended;
    const landColor = landDiff < -2 ? 'border-red-500/30 bg-red-500/5' : landDiff > 2 ? 'border-yellow-500/30 bg-yellow-500/5' : 'border-green-500/30 bg-green-500/5';
    const landMsg = landDiff < -2
      ? `You have ${currentLands} lands — ${Math.abs(landDiff)} below the recommended ${landRec.recommended}. With avg MV ${landRec.avgMV} and ${landRec.rampCount} ramp sources, you may miss land drops.`
      : landDiff > 2
        ? `You have ${currentLands} lands — ${landDiff} above the recommended ${landRec.recommended}. With avg MV ${landRec.avgMV} and ${landRec.rampCount} ramp sources, you could convert some land slots to spells.`
        : `${currentLands} lands is on target (recommended: ${landRec.recommended} for your bracket, MV curve, and ramp density).`;
    const landBox = el('div', { className: `rounded-lg border ${landColor} p-3 mb-4 text-xs` });
    landBox.appendChild(el('div', { className: 'font-semibold text-white mb-0.5' }, ['Land Recommendation']));
    landBox.appendChild(el('div', { className: 'text-mtg-dim' }, [landMsg]));
    container.appendChild(landBox);
  }

  // Card Table
  const nonLand = getNonLandCards();
  const table = el('div', { className: 'space-y-1' });

  // Header (hidden on mobile via CSS)
  const header = el('div', { className: 'card-table-header grid grid-cols-12 gap-2 px-3 py-2 text-xs font-semibold text-mtg-dim border-b border-mtg-border hidden sm:grid' });
  header.appendChild(el('div', { className: 'col-span-4' }, ['Card']));
  header.appendChild(el('div', { className: 'col-span-1 text-center' }, ['MV']));
  header.appendChild(el('div', { className: 'col-span-2 hidden md:block' }, ['Type']));
  header.appendChild(el('div', { className: 'col-span-2 md:col-span-2' }, ['Primary']));
  header.appendChild(el('div', { className: 'col-span-2 md:col-span-2' }, ['Secondary']));
  header.appendChild(el('div', { className: 'col-span-1 text-center hidden md:block' }, ['Info']));
  table.appendChild(header);

  nonLand.forEach(c => {
    const sd = STATE.scryfallData[c.name];
    if (!STATE.categories[c.name]) STATE.categories[c.name] = { primary: '', secondary: '' };
    const cat = STATE.categories[c.name];

    const row = el('div', { className: 'card-table-row grid grid-cols-12 gap-2 px-3 py-2 rounded card-hover border border-transparent items-center text-sm' });

    // Name (with TCGplayer link)
    const nameEl = el('div', { className: 'card-name col-span-4' });
    nameEl.appendChild(cardNameEl(c.name, 'truncate'));
    row.appendChild(nameEl);

    // MV
    const mvEl = el('div', { className: 'card-mv col-span-1 text-center text-mtg-dim text-xs' }, [sd ? `MV ${sd.cmc}` : '?']);
    row.appendChild(mvEl);

    // Type
    const shortType = sd ? sd.type_line.replace(/Legendary\s*/i, '').split('—')[0].trim() : '';
    row.appendChild(el('div', { className: 'card-type col-span-2 text-xs text-mtg-dim truncate hidden md:block' }, [shortType]));

    // Build list of available categories (core + named SAs only)
    const availableCats = CATEGORIES.filter(ct => {
      if (ct === 'Land') return false;
      if (ct.startsWith('SA-')) return !!cs.saNames[parseInt(ct.split('-')[1])-1]; // only named SAs
      return true;
    });

    // Primary Category
    const priSelect = el('select', { className: 'card-primary col-span-2 rounded border px-1 py-1 text-xs' });
    priSelect.appendChild(el('option', { value: '' }, ['— Primary —']));
    availableCats.forEach(ct => {
      const opt = el('option', { value: ct }, [catDisplayName(ct)]);
      if (cat.primary === ct) opt.selected = true;
      priSelect.appendChild(opt);
    });
    priSelect.addEventListener('change', e => { cat.primary = e.target.value; STATE.userEdited[c.name] = true; render(); });
    row.appendChild(priSelect);

    // Secondary Category
    const secSelect = el('select', { className: 'card-secondary col-span-2 rounded border px-1 py-1 text-xs' });
    secSelect.appendChild(el('option', { value: '' }, ['— Secondary —']));
    availableCats.forEach(ct => {
      const opt = el('option', { value: ct }, [catDisplayName(ct)]);
      if (cat.secondary === ct) opt.selected = true;
      secSelect.appendChild(opt);
    });
    secSelect.addEventListener('change', e => { cat.secondary = e.target.value; STATE.userEdited[c.name] = true; render(); });
    row.appendChild(secSelect);

    // Info button (hidden on mobile — tap card name instead)
    const infoBtn = el('div', { className: 'card-info col-span-1 text-center hidden md:block' });
    const oBtn = el('button', {
      className: 'text-mtg-dim hover:text-mtg-gold text-xs',
      onClick: () => showCardModal(c.name)
    }, ['View']);
    infoBtn.appendChild(oBtn);
    row.appendChild(infoBtn);

    table.appendChild(row);
  });

  container.appendChild(table);
  container.appendChild(makeFeedbackBox('categorize', 'How does the categorization process feel? Too tedious? Missing options? Confusing categories?'));
  container.appendChild(navButtons(true, true));
  app.appendChild(container);
}

function renderScore() {
  // Re-run intelligent auto-scoring with full character sheet context
  // Only overwrite cards the user hasn't manually edited
  if (!STATE.fingerEdited) STATE.fingerEdited = {};
  getNonLandCards().forEach(c => {
    if (!STATE.fingerEdited[c.name]) {
      STATE.fingers[c.name] = autoScoreFingers(c.name);
    }
  });

  const app = $('#app');
  const container = el('div', { className: 'fade-in' });
  const cs = STATE.characterSheet;

  container.appendChild(el('h2', { className: 'font-cinzel text-2xl text-mtg-gold mb-2' }, ['5-Finger Quick Check']));
  container.appendChild(el('p', { className: 'text-mtg-dim text-sm mb-4' }, ['Auto-scored from deck analysis. Review and adjust — click any score to toggle it.']));

  container.appendChild(makeInfoBox(
    'Guide: The 5-Finger Quick Check',
    'The 5-Finger score is the card-level metric that feeds every SWP dimension. Commander Signal (CS) drives Signal Density. Dual-Category (DC) drives Cross-Category Pollination. Independent Value (IV) drives Commander Independence. Web Connected (WC) measures how many specific cards each card interacts with — hubs vs. islands. Temporal Fit (TF) checks whether the card is deployable on curve. A card scoring 1-2 out of 5 is a cut candidate. A card scoring 4-5 is load-bearing.',
    'CS, DC, IV, and TF are partially auto-scored from deck analysis. WC (Web Connected) is the hardest to auto-detect and requires your judgment — ask yourself: "Does this card meaningfully interact with 5+ other specific non-land cards in the deck?" If yes, score it 1. IV uses a 3-point scale: 0 = dead without commander, 0.5 = functional but diminished, 1 = fully independent. Click each score button to toggle.',
    'Your 5-Finger averages determine the SWP grades in Step 5 and surface your bottom-10 cut candidates. The running average at the top gives you a real-time "engine health" readout — below 2.0 is Synergy Soup, above 3.5 is a focused engine.'
  ));

  // Legend
  const legendBox = el('div', { className: 'legend-grid grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2 mb-4 p-3 rounded-lg bg-mtg-panel border border-mtg-border text-xs' });
  const fingerDefs = [
    ['CS', 'Commander Signal', 'Directly interacts with commander\'s Primary Ability?', '0/1'],
    ['DC', 'Dual-Category', 'Serves 2+ framework categories?', '0/1'],
    ['WC', 'Web Connected', 'Interacts with 5+ other specific cards?', '0/1'],
    ['IV', 'Independent Value', 'Functions without commander?', '0/0.5/1'],
    ['TF', 'Temporal Fit', 'Playable on curve within deployment window?', '0/1'],
  ];
  fingerDefs.forEach(([code, name, desc, scale]) => {
    legendBox.appendChild(el('div', {}, [
      el('div', { className: 'font-bold text-white' }, [`${code}`]),
      el('div', { className: 'text-mtg-dim' }, [desc]),
      el('div', { className: 'text-mtg-gold mt-0.5' }, [`(${scale})`])
    ]));
  });
  container.appendChild(legendBox);

  // Running avg
  const avg = calcFingerAverages();
  const avgLabel = parseFloat(avg) <= 1.5 ? 'Synergy Soup' : parseFloat(avg) <= 2.5 ? 'Standard' : parseFloat(avg) <= 3.5 ? 'Focused' : parseFloat(avg) <= 4.5 ? 'Engine Online' : 'Inevitability Machine';
  container.appendChild(el('div', { className: 'mb-4 text-sm' }, [
    el('span', { className: 'text-mtg-dim' }, ['Running Average: ']),
    el('span', { className: 'text-mtg-gold font-bold text-lg' }, [avg]),
    el('span', { className: 'text-mtg-dim ml-2' }, [`— ${avgLabel}`])
  ]));

  // Table
  const nonLand = getNonLandCards();
  const table = el('div', { className: 'space-y-1' });

  // Header (hidden on mobile)
  const header = el('div', { className: 'score-table-header grid grid-cols-12 gap-2 px-3 py-2 text-xs font-semibold text-mtg-dim border-b border-mtg-border hidden sm:grid' });
  header.appendChild(el('div', { className: 'col-span-4' }, ['Card']));
  header.appendChild(el('div', { className: 'col-span-1 text-center hidden md:block' }, ['Cat']));
  ['CS','DC','WC','IV','TF'].forEach(f => {
    header.appendChild(el('div', { className: 'col-span-1 text-center' }, [f]));
  });
  header.appendChild(el('div', { className: 'col-span-2 md:col-span-2 text-center' }, ['Total']));
  table.appendChild(header);

  nonLand.forEach(c => {
    if (!STATE.fingers[c.name]) STATE.fingers[c.name] = { cs: 0, dc: 0, wc: 0, iv: 0, tf: 0 };
    const f = STATE.fingers[c.name];
    const cat = STATE.categories[c.name]?.primary || '';
    const total = (f.cs + f.dc + f.wc + f.iv + f.tf).toFixed(1);

    const row = el('div', { className: 'score-table-row grid grid-cols-12 gap-2 px-3 py-1.5 rounded card-hover border border-transparent items-center text-sm' });

    // Name (with TCGplayer link)
    const scoreNameDiv = el('div', { className: 'score-card-name col-span-4 text-xs' });
    scoreNameDiv.appendChild(cardNameEl(c.name, 'truncate'));
    row.appendChild(scoreNameDiv);

    // Category pill (hidden on mobile/tablet)
    const catPill = el('div', { className: 'score-cat col-span-1 text-center hidden md:block' });
    if (cat) {
      const label = catDisplayName(cat).slice(0, 12);
      catPill.appendChild(el('span', { className: 'cat-pill', style: `background:${CAT_COLORS[cat]}33; color:${CAT_COLORS[cat]}` }, [label]));
    }
    row.appendChild(catPill);

    // Score buttons wrapper
    const fingerWrap = el('div', { className: 'score-fingers col-span-5 flex justify-center gap-1' });
    ['cs','dc','wc','iv','tf'].forEach(key => {
      if (key === 'iv') {
        const btn = el('button', {
          className: `score-btn rounded px-2 py-1 text-xs border border-mtg-border ${f[key] > 0 ? 'selected' : 'text-mtg-dim'}`,
          onClick: () => { f[key] = f[key] === 0 ? 0.5 : f[key] === 0.5 ? 1 : 0; STATE.fingerEdited[c.name] = true; render(); }
        }, [String(f[key])]);
        fingerWrap.appendChild(btn);
      } else {
        const btn = el('button', {
          className: `score-btn rounded px-2 py-1 text-xs border border-mtg-border ${f[key] ? 'selected' : 'text-mtg-dim'}`,
          onClick: () => { f[key] = f[key] ? 0 : 1; STATE.fingerEdited[c.name] = true; render(); }
        }, [String(f[key])]);
        fingerWrap.appendChild(btn);
      }
    });
    row.appendChild(fingerWrap);

    // Total
    const totalColor = parseFloat(total) >= 3.6 ? 'text-green-400' : parseFloat(total) >= 2.6 ? 'text-mtg-gold' : parseFloat(total) >= 1.6 ? 'text-mtg-dim' : 'text-red-400';
    row.appendChild(el('div', { className: `score-total col-span-2 text-center font-bold ${totalColor}` }, [total]));

    table.appendChild(row);
  });

  container.appendChild(table);
  container.appendChild(makeFeedbackBox('scoring', 'How does the 5-Finger scoring feel? Are the definitions clear? Is any finger hard to evaluate?'));
  container.appendChild(navButtons(true, true));
  app.appendChild(container);
}

// ============================================================
// STEP 5: RESULTS
// ============================================================
function renderResults() {
  const app = $('#app');
  const container = el('div', { className: 'fade-in' });

  container.appendChild(el('h2', { className: 'font-cinzel text-2xl text-mtg-gold mb-2' }, ['Synergy Web Protocol — Results']));
  container.appendChild(el('p', { className: 'text-mtg-dim text-sm mb-4' }, ['Your deck\'s synergy profile based on the 5-Finger data and framework categorization.']));

  container.appendChild(makeInfoBox(
    'Guide: Reading Your SWP Profile',
    'The Synergy Web Protocol measures deck synergy across multiple dimensions, not a single number. Signal Density (SD) tells you how focused the deck is on its game plan. Commander Independence (CI) reveals whether the deck collapses without its commander — the "Top-Down Trap." Cross-Category Pollination (CCP) measures interconnectedness — how many cards serve double duty across framework categories. These three metrics are independent and can tell different stories: a deck can have high SD but low CCP (focused but linear) or high CCP but low SD (interconnected but unfocused).',
    'Look at each grade and ask: does this match how the deck FEELS when you play it? If SD is low but the deck performs well, you may have mis-scored CS on some cards. If CI is high but you feel helpless without your commander, some IV scores may be too generous. The diagnostic flags at the bottom detect specific failure patterns (Pillars of Failure) — each one includes a concrete description of the problem and what ratio is off.',
    'A complete SWP profile gives you a structural map of your deck\'s strengths and weaknesses. The bottom-10 cut list identifies the weakest links. The diagnostic flags highlight systemic issues. Together, they tell you not just "this deck needs work" but exactly WHERE and WHY — which is what separates this from generic synergy scores.'
  ));

  const cs = STATE.characterSheet;

  // Character Sheet Summary
  const summaryBox = el('div', { className: 'rounded-lg border border-mtg-border p-4 mb-6 bg-mtg-panel' });
  summaryBox.appendChild(el('div', { className: 'font-cinzel text-lg text-white mb-2' }, [cs.commanderName || 'Unknown Commander']));
  const summaryGrid = el('div', { className: 'grid grid-cols-2 gap-x-4 gap-y-1 text-xs' });
  summaryGrid.appendChild(el('div', { className: 'text-mtg-dim' }, ['Bracket']));
  summaryGrid.appendChild(el('div', { className: 'text-white' }, [cs.bracket ? BRACKET_PROFILES[cs.bracket].label : '—']));
  summaryGrid.appendChild(el('div', { className: 'text-mtg-dim' }, ['Axis']));
  summaryGrid.appendChild(el('div', { className: 'text-white capitalize' }, [cs.axis || '—']));
  summaryGrid.appendChild(el('div', { className: 'text-mtg-dim' }, ['Threat Level']));
  summaryGrid.appendChild(el('div', { className: 'text-white capitalize' }, [cs.threatLevel || '—']));
  summaryGrid.appendChild(el('div', { className: 'text-mtg-dim' }, ['Wins By']));
  summaryGrid.appendChild(el('div', { className: 'text-white' }, [cs.winsBy || '—']));
  summaryBox.appendChild(summaryGrid);
  container.appendChild(summaryBox);

  // SWP Dimensional Scores — cards with grades
  const sd = parseFloat(calcSD());
  const ci = parseFloat(calcCI());
  const ccp = parseFloat(calcCCP());
  const sdG = getSDGrade(sd), ciG = getCIGrade(ci), ccpG = getCCPGrade(ccp);

  const dimGrid = el('div', { className: 'dim-grid grid grid-cols-1 sm:grid-cols-3 gap-3 sm:gap-4 mb-6' });

  // SD
  dimGrid.appendChild(makeDimCard('Signal Density', sd, sdG,
    'What % of non-land cards directly interact with the commander\'s Primary Ability?'));
  // CI
  dimGrid.appendChild(makeDimCard('Commander Independence', ci, ciG,
    'How well does the deck function if the commander is permanently removed?'));
  // CCP
  dimGrid.appendChild(makeDimCard('Cross-Category Pollination', ccp, ccpG,
    'What % of non-land cards serve more than one framework category?'));

  container.appendChild(dimGrid);

  // SWP Radar Chart & Tier Badge
  const radarSection = el('div', { className: 'rounded-lg border border-mtg-border p-6 mb-6 bg-mtg-panel text-center' });
  radarSection.appendChild(el('h3', { className: 'font-cinzel text-lg text-mtg-gold mb-4' }, ['SWP Profile']));

  const canvasContainer = el('div', { style: 'display:flex;justify-content:center;margin-bottom:1.5rem' });
  const canvasSize = Math.min(320, (window.innerWidth - 48));
  const canvas = el('canvas', { id: 'swp-radar', width: String(canvasSize), height: String(canvasSize), style: 'max-width:100%;height:auto;' });
  canvasContainer.appendChild(canvas);
  radarSection.appendChild(canvasContainer);

  // Draw radar chart after adding to DOM
  setTimeout(() => {
    drawRadarChart(canvas, { sd, ci, ccp, ed: 0, ri: 0 });
  }, 10);

  // Tier badge
  const tierInfo = getTierBadgeInfo();
  const badgeBox = el('div', { className: 'rounded-lg border-2 p-4 mt-4', style: `border-color:${tierInfo.tierColor};background:${tierInfo.tierBgColor}` });
  badgeBox.appendChild(el('div', { className: 'text-sm text-mtg-dim mb-1' }, ['5-Finger Score']));
  badgeBox.appendChild(el('div', { className: 'text-3xl font-bold mb-2', style: `color:${tierInfo.tierColor}` }, [tierInfo.avgFinger]));
  badgeBox.appendChild(el('div', { className: 'text-xs text-mtg-dim mb-3' }, [cs.bracket ? BRACKET_PROFILES[cs.bracket].label : 'Bracket unknown']));
  badgeBox.appendChild(el('div', { className: 'text-lg font-cinzel', style: `color:${tierInfo.tierColor}` }, [tierInfo.tier]));
  if (tierInfo.tier === 'Inevitability Machine') {
    badgeBox.style.boxShadow = `0 0 20px ${tierInfo.tierColor}40`;
  }
  radarSection.appendChild(badgeBox);

  container.appendChild(radarSection);

  // Category Counts
  const counts = calcCategoryCounts();
  container.appendChild(el('h3', { className: 'font-cinzel text-lg text-white mb-3' }, ['Framework Ratios']));
  const ratioGrid = el('div', { className: 'results-ratio-grid grid grid-cols-3 sm:grid-cols-5 gap-2 sm:gap-3 mb-6' });
  const profile = getProfile();
  const ratioTargets = {
    Velocity: profile.velocity, Ramp: profile.ramp,
    Interaction: profile.interaction, Wipe: profile.wipe, Land: profile.lands
  };
  Object.entries(ratioTargets).forEach(([cat, [min, max]]) => {
    const count = counts[cat];
    const ok = count >= min && count <= max;
    const low = count < min;
    const card = el('div', { className: 'rounded-lg border border-mtg-border p-3 bg-mtg-panel text-center' });
    card.appendChild(el('div', { className: 'text-xs text-mtg-dim mb-1' }, [cat]));
    card.appendChild(el('div', { className: `text-2xl font-bold ${low ? 'text-red-400' : ok ? 'text-green-400' : 'text-yellow-400'}` }, [String(count)]));
    card.appendChild(el('div', { className: 'text-xs text-mtg-dim' }, [`target: ${min}${min !== max ? '-'+max : ''}`]));
    ratioGrid.appendChild(card);
  });
  container.appendChild(ratioGrid);

  // SA Counts
  const saGrid = el('div', { className: 'results-sa-grid grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2 sm:gap-3 mb-6' });
  for (let i = 1; i <= 5; i++) {
    const cat = `SA-${i}`;
    const label = catDisplayName(cat);
    const count = counts[cat] || 0;
    const card = el('div', { className: 'rounded-lg border border-mtg-border p-3 bg-mtg-panel text-center' });
    card.appendChild(el('div', { className: 'text-xs truncate', style: `color:${CAT_COLORS[cat]}` }, [label]));
    card.appendChild(el('div', { className: 'text-2xl font-bold text-white' }, [String(count)]));
    saGrid.appendChild(card);
  }
  container.appendChild(saGrid);

  // Avg MV
  const avgMV = calcAvgMV();
  container.appendChild(el('div', { className: 'mb-6 p-3 rounded-lg border border-mtg-border bg-mtg-panel flex items-center justify-between' }, [
    el('span', { className: 'text-sm text-mtg-dim' }, ['Average Non-Land Mana Value']),
    el('span', { className: `text-xl font-bold ${parseFloat(avgMV) > 2.5 ? 'text-red-400' : parseFloat(avgMV) > 2.2 ? 'text-yellow-400' : 'text-green-400'}` }, [avgMV]),
  ]));

  // 5-Finger Average
  const avgFinger = calcFingerAverages();
  const fingerLabel = parseFloat(avgFinger) <= 1.5 ? 'Synergy Soup' : parseFloat(avgFinger) <= 2.5 ? 'Standard' : parseFloat(avgFinger) <= 3.5 ? 'Focused' : parseFloat(avgFinger) <= 4.5 ? 'Engine Online' : 'Inevitability Machine';
  container.appendChild(el('div', { className: 'mb-6 p-3 rounded-lg border border-mtg-border bg-mtg-panel flex items-center justify-between' }, [
    el('span', { className: 'text-sm text-mtg-dim' }, ['Average 5-Finger Score']),
    el('div', {}, [
      el('span', { className: 'text-xl font-bold text-mtg-gold mr-2' }, [avgFinger]),
      el('span', { className: 'text-sm text-mtg-dim' }, [fingerLabel])
    ])
  ]));

  // Pillar Flags
  const flags = checkPillars();
  container.appendChild(el('h3', { className: 'font-cinzel text-lg text-white mb-3' }, ['Diagnostic Flags']));
  if (flags.length === 0) {
    container.appendChild(el('div', { className: 'p-3 rounded-lg border border-green-500/30 bg-green-500/5 text-green-400 text-sm mb-6' }, ['No flags detected. Framework ratios look healthy.']));
  } else {
    const flagList = el('div', { className: 'space-y-2 mb-6' });
    flags.forEach(f => {
      const card = el('div', { className: 'p-3 rounded-lg border border-red-500/30 bg-red-500/5' });
      card.appendChild(el('div', { className: 'text-sm font-semibold text-red-400' }, [f.pillar ? `Pillar ${f.pillar}: ${f.label}` : f.label]));
      card.appendChild(el('div', { className: 'text-xs text-mtg-dim mt-1' }, [f.msg]));
      flagList.appendChild(card);
    });
    container.appendChild(flagList);
  }

  // Bottom-10 Cut List — cards with lowest 5-Finger scores
  const nonLand = getNonLandCards();
  const scored = nonLand.filter(c => STATE.fingers[c.name]).map(c => ({
    name: c.name,
    total: Object.values(STATE.fingers[c.name]).reduce((a,b) => a+b, 0),
    cat: STATE.categories[c.name]?.primary || '',
    mv: STATE.scryfallData[c.name]?.cmc ?? '?'
  })).sort((a, b) => a.total - b.total);

  container.appendChild(el('h3', { className: 'font-cinzel text-lg text-white mb-3' }, ['Bottom 10 — Cut Candidates']));
  if (scored.length > 0) {
    container.appendChild(el('p', { className: 'text-xs text-mtg-dim mb-3' }, ['These cards scored lowest on the 5-Finger check. Consider whether each one truly earns its slot, or whether a higher-synergy replacement exists.']));
    const cutTable = el('div', { className: 'space-y-1 mb-6' });
    const cutHeader = el('div', { className: 'cut-list-header grid grid-cols-12 gap-2 px-3 py-1.5 text-xs font-semibold text-mtg-dim border-b border-mtg-border hidden sm:grid' });
    cutHeader.appendChild(el('div', { className: 'col-span-1' }, ['#']));
    cutHeader.appendChild(el('div', { className: 'col-span-5' }, ['Card']));
    cutHeader.appendChild(el('div', { className: 'col-span-2' }, ['Category']));
    cutHeader.appendChild(el('div', { className: 'col-span-2 text-center' }, ['MV']));
    cutHeader.appendChild(el('div', { className: 'col-span-2 text-center' }, ['Score']));
    cutTable.appendChild(cutHeader);

    scored.slice(0, 10).forEach((c, i) => {
      const row = el('div', { className: 'cut-list-row grid grid-cols-12 gap-2 px-3 py-1.5 rounded card-hover border border-transparent items-center text-sm' });
      row.appendChild(el('div', { className: 'col-span-1 text-xs text-mtg-dim hidden sm:block' }, [String(i + 1)]));
      const cutNameDiv = el('div', { className: 'cut-name col-span-5' });
      const cutNameWrap = cardNameEl(c.name, 'truncate');
      // Prepend rank number
      cutNameWrap.insertBefore(el('span', { className: 'text-mtg-dim mr-1' }, [`${i+1}.`]), cutNameWrap.firstChild);
      cutNameDiv.appendChild(cutNameWrap);
      row.appendChild(cutNameDiv);
      const catLabel = catDisplayName(c.cat);
      const catColor = CAT_COLORS[c.cat] || '#8b92a8';
      row.appendChild(el('div', { className: 'col-span-2 hidden sm:block' }, [
        catLabel ? el('span', { className: 'cat-pill', style: `background:${catColor}33; color:${catColor}` }, [catLabel]) : el('span', { className: 'text-xs text-mtg-dim' }, ['—'])
      ]));
      row.appendChild(el('div', { className: 'col-span-2 text-center text-mtg-dim text-xs' }, [`MV ${c.mv}`]));
      const scoreColor = c.total <= 1.5 ? 'text-red-400' : c.total <= 2.5 ? 'text-yellow-400' : 'text-mtg-dim';
      row.appendChild(el('div', { className: `cut-scores col-span-2 text-center font-bold ${scoreColor}` }, [c.total.toFixed(1) + '/5']));
      cutTable.appendChild(row);
    });
    container.appendChild(cutTable);
  }

  // ═══════════════════════════════════════════════════
  // SWP CARD INSIGHTS — Teaching section: exemplars + weak dimension coaching
  // ═══════════════════════════════════════════════════
  const insightsBox = el('div', { className: 'mb-6 p-5 rounded-lg border border-mtg-gold/40 bg-mtg-panel' });
  insightsBox.appendChild(el('h3', { className: 'font-cinzel text-lg text-mtg-gold mb-1' }, ['SWP Card Insights']));
  insightsBox.appendChild(el('p', { className: 'text-xs text-mtg-dim mb-4' }, ['Learn what makes cards score well. Exemplars show the gold standard; dimension coaching shows where to improve.']));

  // Top 5 Exemplars — highest scoring cards with WHY breakdown
  const top5 = scored.slice().sort((a, b) => b.total - a.total).slice(0, 5);
  if (top5.length > 0) {
    insightsBox.appendChild(el('div', { className: 'text-sm font-semibold text-mtg-gold mb-2' }, ['Top 5 Exemplars — Cards That Earn Every Slot']));
    const exemplarList = el('div', { className: 'space-y-2 mb-5' });
    top5.forEach(c => {
      const f = STATE.fingers[c.name] || {};
      const card = el('div', { className: 'p-3 rounded border border-mtg-gold/20 bg-mtg-dark/40' });
      const topRow = el('div', { className: 'flex justify-between items-center mb-1' });
      topRow.appendChild(cardNameEl(c.name, 'font-semibold text-white text-sm'));
      topRow.appendChild(el('span', { className: 'text-mtg-gold font-bold text-sm' }, [c.total.toFixed(1) + '/5']));
      card.appendChild(topRow);

      // Score breakdown with explanations
      const reasons = [];
      if (f.cs >= 1) reasons.push('CS: Directly supports commander strategy');
      if (f.dc >= 1) reasons.push('DC: Serves multiple categories');
      if (f.wc >= 1) reasons.push('WC: Connects to 5+ other cards');
      if (f.iv >= 1) reasons.push('IV: Fully functional without commander');
      else if (f.iv >= 0.5) reasons.push('IV: Diminished but functional alone');
      if (f.tf >= 1) reasons.push('TF: Deployable on curve');
      card.appendChild(el('div', { className: 'text-xs text-mtg-dim' }, [reasons.join(' · ')]));
      exemplarList.appendChild(card);
    });
    insightsBox.appendChild(exemplarList);
  }

  // Dimension Coaching — for each weak SWP dimension, explain what to improve
  const dimCoaching = [];
  if (sdG === 'D' || sdG === 'F') {
    dimCoaching.push({
      dim: 'Signal Density',
      grade: sdG,
      tip: 'Too few cards interact with your commander\'s primary ability. Look for cards that directly trigger, enable, or amplify what your commander does. Every card should ask: "Does this make my commander better?"',
      fix: 'Replace generic goodstuff with cards that specifically mention mechanics your commander cares about.'
    });
  }
  if (ciG === 'D' || ciG === 'F') {
    dimCoaching.push({
      dim: 'Commander Independence',
      grade: ciG,
      tip: 'Your deck is too dependent on your commander being in play. If your commander gets exiled or taxed out, you need cards that function independently.',
      fix: 'Add cards with standalone value — creatures with ETBs, planeswalkers, or enchantments that generate value on their own.'
    });
  }
  if (ccpG === 'D' || ccpG === 'F') {
    dimCoaching.push({
      dim: 'Cross-Category Pollination',
      grade: ccpG,
      tip: 'Not enough cards serve double duty across categories. Look for "bridge cards" that count as both Ramp AND SA-support, or Velocity AND Interaction.',
      fix: 'Prioritize modal spells, MDFC lands, and cards that naturally fit two roles (e.g., Skullclamp in token decks is both Velocity and SA-support).'
    });
  }

  if (dimCoaching.length > 0) {
    insightsBox.appendChild(el('div', { className: 'text-sm font-semibold text-mtg-gold mb-2' }, ['Dimension Coaching — Where to Improve']));
    const coachList = el('div', { className: 'space-y-2 mb-4' });
    dimCoaching.forEach(d => {
      const card = el('div', { className: 'p-3 rounded border border-red-500/20 bg-red-500/5' });
      card.appendChild(el('div', { className: 'flex justify-between items-center mb-1' }, [
        el('span', { className: 'text-sm font-semibold text-white' }, [d.dim]),
        el('span', { className: 'text-red-400 font-bold text-sm' }, ['Grade: ' + d.grade])
      ]));
      card.appendChild(el('div', { className: 'text-xs text-mtg-dim mb-1' }, [d.tip]));
      card.appendChild(el('div', { className: 'text-xs text-mtg-gold' }, [d.fix]));
      coachList.appendChild(card);
    });
    insightsBox.appendChild(coachList);
  }

  // Five-Finger Quick Reference — teaches the scoring system
  insightsBox.appendChild(el('div', { className: 'text-sm font-semibold text-mtg-gold mb-2' }, ['Five-Finger Quick Reference']));
  const fingerRef = el('div', { className: 'grid grid-cols-1 sm:grid-cols-5 gap-2' });
  const fingerDefs = [
    { abbr: 'CS', name: 'Commander Signal', desc: 'Does this card directly interact with your commander\'s primary ability?' },
    { abbr: 'DC', name: 'Dual-Category', desc: 'Does this card serve 2+ framework categories?' },
    { abbr: 'WC', name: 'Web Connected', desc: 'Does this card interact with 5+ other specific cards?' },
    { abbr: 'IV', name: 'Independent Value', desc: 'Does this card function without the commander?' },
    { abbr: 'TF', name: 'Temporal Fit', desc: 'Is this card playable within your deployment window?' }
  ];
  fingerDefs.forEach(fd => {
    const fCard = el('div', { className: 'p-2 rounded border border-mtg-border/50 bg-mtg-dark/30 text-center' });
    fCard.appendChild(el('div', { className: 'text-mtg-gold font-bold text-sm' }, [fd.abbr]));
    fCard.appendChild(el('div', { className: 'text-xs text-white mb-1' }, [fd.name]));
    fCard.appendChild(el('div', { className: 'text-[10px] text-mtg-dim' }, [fd.desc]));
    fingerRef.appendChild(fCard);
  });
  insightsBox.appendChild(fingerRef);

  container.appendChild(insightsBox);

  container.appendChild(makeFeedbackBox('results', 'Do these results feel accurate? Any scores that surprise you? What\'s missing from the analysis?'));
  container.appendChild(navButtons(true, true, 'Export & Finish'));
  app.appendChild(container);
}

const SWP_TIPS = {
  'Signal Density': 'What % of your 99 directly interacts with your commander\'s primary ability',
  'Commander Independence': 'How well your deck functions when your commander is removed or unavailable',
  'Cross-Category Pollination': 'What % of your cards serve 2+ categories, creating interconnected synergies',
};

function makeDimCard(title, pct, grade, desc) {
  const card = el('div', { className: 'rounded-lg border border-mtg-border p-4 bg-mtg-panel' });
  const titleRow = el('div', { className: 'text-xs text-mtg-dim mb-2 flex items-center' }, [title]);
  if (SWP_TIPS[title]) titleRow.appendChild(helpTip(SWP_TIPS[title]));
  card.appendChild(titleRow);
  const row = el('div', { className: 'flex items-end gap-2 mb-2' });
  row.appendChild(el('div', { className: 'text-3xl font-bold', style: `color:${gradeColor(grade)}` }, [grade]));
  row.appendChild(el('div', { className: 'text-lg text-mtg-dim mb-1' }, [`${pct}%`]));
  card.appendChild(row);
  // Bar
  const bar = el('div', { className: 'h-2 rounded-full bg-mtg-border overflow-hidden mb-2' });
  bar.appendChild(el('div', { className: 'h-full rounded-full transition-all', style: `width:${Math.min(pct, 100)}%; background:${gradeColor(grade)}` }));
  card.appendChild(bar);
  card.appendChild(el('div', { className: 'text-xs text-mtg-dim' }, [desc]));
  return card;
}

        },

      };

    onClick: () => {

      const sd = calcSD(), ci = calcCI(), ccp = calcCCP();
      const counts = calcCategoryCounts();
      let text = `MANABOT INSIGHTS AUDIT — ${cs.commanderName}\n`;
      text += `${'='.repeat(50)}\n\n`;
      text += `CHARACTER SHEET\n`;
      text += `Commander: ${cs.commanderName}\n`;
      text += `Bracket: ${cs.bracket ? BRACKET_PROFILES[cs.bracket].label : 'Not set'}\n`;
      text += `Primary Ability: ${cs.primaryAbility}\n`;
      text += `Axis: ${cs.axis}\n`;
      text += `Threat Level: ${cs.threatLevel}\n`;
      text += `Wins By: ${cs.winsBy}\n`;
      for (let i = 0; i < 5; i++) { if (cs.saNames[i]) text += `${cs.saNames[i]}: ${cs.sa[i]}\n`; }
      text += `\nSYNERGY PROFILE\n`;
      text += `Signal Density: ${sd}% — ${getSDGrade(parseFloat(sd))}\n`;
      text += `Commander Independence: ${ci}% — ${getCIGrade(parseFloat(ci))}\n`;
      text += `Cross-Category Pollination: ${ccp}% — ${getCCPGrade(parseFloat(ccp))}\n`;
      text += `\nFRAMEWORK RATIOS\n`;
      Object.entries(counts).forEach(([cat, count]) => { if (cat === 'Land' || !cat.startsWith('SA-') || cs.saNames[parseInt(cat.split('-')[1])-1]) text += `${catDisplayName(cat)}: ${count}\n`; });
      text += `\nAvg MV: ${calcAvgMV()}\n`;
      text += `Avg 5-Finger: ${calcFingerAverages()}\n`;
      text += `\nFLAGS\n`;
      checkPillars().forEach(f => { text += `- ${f.label}: ${f.msg}\n`; });
      text += `\nFEEDBACK\n`;
      Object.entries(STATE.feedback).forEach(([k,v]) => { if (v) text += `[${k}]: ${v}\n`; });

      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${cs.commanderName || 'deck'}_audit.txt`;
      a.click();
      URL.revokeObjectURL(url);
    }
  }, ['Download Text Report']);
  container.appendChild(textBtn);

  // Copy to clipboard
  const copyBtn = el('button', {
    className: 'w-full mb-6 px-5 py-3 rounded-lg border border-mtg-border text-mtg-dim hover:text-white hover:border-mtg-gold transition text-sm',
    onClick: () => {
      const cs = STATE.characterSheet;
      const sd = calcSD(), ci = calcCI(), ccp = calcCCP();
      let text = `**${cs.commanderName} — Manabot Insights Audit**\n`;
      text += `Bracket: ${cs.bracket || '?'} | Axis: ${cs.axis} | Threat: ${cs.threatLevel}\n`;
      text += `SD: ${sd}% (${getSDGrade(parseFloat(sd))}) | CI: ${ci}% (${getCIGrade(parseFloat(ci))}) | CCP: ${ccp}% (${getCCPGrade(parseFloat(ccp))})\n`;
      text += `Avg MV: ${calcAvgMV()} | Avg 5-Finger: ${calcFingerAverages()}\n`;
      const flags = checkPillars();
      if (flags.length) text += `Flags: ${flags.map(f => f.label).join(', ')}\n`;
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy Summary to Clipboard (for Discord/etc.)'; }, 2000);
      });
    }
  }, ['Copy Summary to Clipboard (for Discord/etc.)']);
  container.appendChild(copyBtn);

  // Share URL
  const shareBtn = el('button', {
    className: 'w-full mb-6 px-5 py-3 rounded-lg bg-mtg-gold/10 border border-mtg-gold text-mtg-gold hover:bg-mtg-gold/20 transition text-sm font-semibold',
    onClick: () => {
      const url = generateShareURL();
      navigator.clipboard.writeText(url).then(() => {
        shareBtn.textContent = 'Link Copied! Share it anywhere.';
        shareBtn.classList.add('bg-green-500/10', 'border-green-500', 'text-green-400');
        setTimeout(() => {
          shareBtn.textContent = 'Copy Shareable Link';
          shareBtn.classList.remove('bg-green-500/10', 'border-green-500', 'text-green-400');
        }, 3000);
      });
    }
  }, ['Copy Shareable Link']);
  container.appendChild(shareBtn);

  // Final Feedback
  container.appendChild(el('h3', { className: 'font-cinzel text-lg text-white mb-3' }, ['Overall Feedback']));
  container.appendChild(makeFeedbackBox('overall', 'Any final thoughts on Manabot Insights or the methodology? What would make this more useful?'));

  container.appendChild(el('div', { className: 'mt-8 text-center text-xs text-mtg-dim' }, [
    'Thank you for beta testing! Your feedback directly improves the methodology.'
  ]));

  container.appendChild(navButtons(true, false));
  app.appendChild(container);
}

// ============================================================
// SHAREABLE RESULTS URL
// ============================================================
function generateShareURL() {
  const cs = STATE.characterSheet;
  const sd = calcSD(), ci = calcCI(), ccp = calcCCP();
  const avgMV = calcAvgMV();
  const avgFinger = calcFingerAverages();
  const counts = calcCategoryCounts();
  const flags = checkPillars();
  const shareData = {
    c: cs.commanderName,
    b: cs.bracket,
    ax: cs.axis,
    th: cs.threatLevel,
    pa: cs.primaryAbility,
    wb: cs.winsBy,
    sa: cs.saNames.filter(n => n),
    sd: sd, ci: ci, ccp: ccp,
    mv: avgMV, fg: avgFinger,
    ct: counts,
    fl: flags.map(f => f.label),
    v: '0.1'
  };
  const json = JSON.stringify(shareData);
  const encoded = btoa(unescape(encodeURIComponent(json)));
  return window.location.origin + window.location.pathname + '?share=' + encoded;
}

function loadShareData() {
  const params = new URLSearchParams(window.location.search);
  const shareParam = params.get('share');
  if (!shareParam) return null;
  try {
    const json = decodeURIComponent(escape(atob(shareParam)));
    return JSON.parse(json);
  } catch (e) { return null; }
}

function renderSharedView(data) {
  const app = $('#app');
  app.innerHTML = '';
  const container = el('div', { className: 'fade-in max-w-3xl mx-auto' });

  // Shared Results Banner
  const banner = el('div', { className: 'mb-6 p-4 rounded-lg border border-mtg-gold/30 bg-mtg-gold/5 text-center' });
  banner.appendChild(el('div', { className: 'text-mtg-gold font-cinzel text-sm mb-1' }, ['Shared Deck Audit']));
  banner.appendChild(el('div', { className: 'text-mtg-dim text-xs' }, ['This is a read-only view of an audit. Run your own audit to get the full interactive experience.']));
  container.appendChild(banner);

  // Commander Header
  container.appendChild(el('h2', { className: 'font-cinzel text-2xl text-mtg-gold mb-1' }, [data.c || 'Unknown Commander']));
  const meta = [];
  if (data.b) meta.push(`Bracket ${data.b}`);
  if (data.ax) meta.push(data.ax);
  if (data.th) meta.push(data.th);
  container.appendChild(el('p', { className: 'text-mtg-dim text-sm mb-6' }, [meta.join(' · ')]));

  if (data.pa) {
    container.appendChild(el('div', { className: 'text-sm mb-1' }, [
      el('span', { className: 'text-mtg-dim' }, ['Primary Ability: ']),
      el('span', { className: 'text-white font-semibold' }, [data.pa])
    ]));
  }
  if (data.wb) {
    container.appendChild(el('div', { className: 'text-sm mb-4' }, [
      el('span', { className: 'text-mtg-dim' }, ['Wins By: ']),
      el('span', { className: 'text-white font-semibold' }, [data.wb])
    ]));
  }

  // SWP Scores
  const swpGrid = el('div', { className: 'dim-grid grid grid-cols-1 sm:grid-cols-3 gap-3 sm:gap-4 mb-6' });
  const dims = [
    { label: 'Signal Density', val: data.sd, grade: getSDGrade(parseFloat(data.sd)), desc: 'How strongly your 99 echoes the commander' },
    { label: 'Commander Independence', val: data.ci, grade: getCIGrade(parseFloat(data.ci)), desc: 'How well the deck functions without the commander' },
    { label: 'Cross-Cat Pollination', val: data.ccp, grade: getCCPGrade(parseFloat(data.ccp)), desc: 'How interconnected your categories are' },
  ];
  dims.forEach(d => {
    const card = el('div', { className: 'p-4 rounded-lg bg-mtg-panel border border-mtg-border text-center' });
    card.appendChild(el('div', { className: 'text-xs text-mtg-dim mb-1' }, [d.label]));
    card.appendChild(el('div', { className: 'text-2xl font-bold text-mtg-gold' }, [`${d.val}%`]));
    card.appendChild(el('div', { className: 'text-sm font-semibold text-white' }, [d.grade]));
    card.appendChild(el('div', { className: 'text-xs text-mtg-dim mt-1' }, [d.desc]));
    swpGrid.appendChild(card);
  });
  container.appendChild(swpGrid);

  // Stats bar
  const statsBar = el('div', { className: 'flex justify-center gap-6 mb-6 text-sm' });
  statsBar.appendChild(el('div', { className: 'text-center' }, [
    el('div', { className: 'text-mtg-dim text-xs' }, ['Avg MV']),
    el('div', { className: 'text-white font-bold' }, [String(data.mv)])
  ]));
  statsBar.appendChild(el('div', { className: 'text-center' }, [
    el('div', { className: 'text-mtg-dim text-xs' }, ['Avg 5-Finger']),
    el('div', { className: 'text-white font-bold' }, [String(data.fg)])
  ]));
  container.appendChild(statsBar);

  // Category Counts
  if (data.ct) {
    const ratioGrid = el('div', { className: 'results-ratio-grid grid grid-cols-3 sm:grid-cols-5 gap-2 sm:gap-3 mb-6' });
    ['Velocity','Ramp','Interaction','Wipe','Land'].forEach(cat => {
      if (data.ct[cat] !== undefined) {
        ratioGrid.appendChild(el('div', { className: 'text-center p-2 rounded bg-mtg-panel border border-mtg-border' }, [
          el('div', { className: 'text-xs text-mtg-dim' }, [cat]),
          el('div', { className: 'text-lg font-bold text-white' }, [String(data.ct[cat])])
        ]));
      }
    });
    container.appendChild(ratioGrid);

    // SA Counts
    if (data.sa && data.sa.length > 0) {
      const saGrid = el('div', { className: 'results-sa-grid grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-2 sm:gap-3 mb-6' });
      data.sa.forEach((name, i) => {
        const key = `SA-${i+1}`;
        if (data.ct[key] !== undefined) {
          saGrid.appendChild(el('div', { className: 'text-center p-2 rounded bg-mtg-panel border border-mtg-border' }, [
            el('div', { className: 'text-xs text-mtg-dim truncate' }, [name]),
            el('div', { className: 'text-lg font-bold text-white' }, [String(data.ct[key])])
          ]));
        }
      });
      container.appendChild(saGrid);
    }
  }

  // Flags
  if (data.fl && data.fl.length > 0) {
    container.appendChild(el('h3', { className: 'font-cinzel text-lg text-white mb-2' }, ['Diagnostic Flags']));
    const flagBox = el('div', { className: 'space-y-1 mb-6' });
    data.fl.forEach(f => {
      flagBox.appendChild(el('div', { className: 'flex items-center gap-2 text-sm text-yellow-400' }, [
        el('span', {}, ['\u26A0']),
        el('span', {}, [f])
      ]));
    });
    container.appendChild(flagBox);
  }

  // CTA
  const cta = el('div', { className: 'mt-8 text-center' });
  cta.appendChild(el('a', {
    href: window.location.pathname,
    className: 'inline-block px-8 py-3 rounded-lg bg-mtg-gold text-mtg-dark font-semibold hover:bg-mtg-accent transition text-sm'
  }, ['Run Your Own Audit']));
  container.appendChild(cta);

  app.appendChild(container);
}

// ============================================================
// AUTO-SAVE — persist STATE to localStorage on every change
// ============================================================
const SAVE_KEY = 'manabot-insights-state';

function saveState() {
  try {
    // Save everything except scryfallData (too large, re-fetched on import)
    const toSave = {
      step: STATE.step,
      rawText: STATE.rawText,
      commanderInput: STATE.commanderInput,
      parsedCards: STATE.parsedCards,
      fetchErrors: STATE.fetchErrors,
      characterSheet: STATE.characterSheet,
      categories: STATE.categories,
      fingers: STATE.fingers,
      feedback: STATE.feedback,
      userEdited: STATE.userEdited,
      fingerEdited: STATE.fingerEdited,
      // Store card names so we can re-fetch scryfall data
      _hasScryfallData: Object.keys(STATE.scryfallData).length > 0,
      _savedAt: Date.now()
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(toSave));
  } catch (e) { /* storage full or unavailable — silently ignore */ }
}

function loadState() {
  try {
    const saved = localStorage.getItem(SAVE_KEY);
    if (!saved) return false;
    const data = JSON.parse(saved);
    // Only restore if saved within last 7 days
    if (data._savedAt && (Date.now() - data._savedAt) > 7 * 24 * 60 * 60 * 1000) {
      localStorage.removeItem(SAVE_KEY);
      return false;
    }
    Object.keys(data).forEach(k => {
      if (!k.startsWith('_') && STATE.hasOwnProperty(k)) STATE[k] = data[k];
    });
    return data._hasScryfallData || false;
  } catch (e) { return false; }
}

function clearSavedState() {
  localStorage.removeItem(SAVE_KEY);
}

// Patch render() to auto-save after every re-render
const _baseRender = render;
render = function() {
  _baseRender();
  saveState();
};

// ============================================================
// INIT — restore saved state if available
// ============================================================
// Check for shared view first
const shareData = loadShareData();
if (shareData) {
  renderSharedView(shareData);
} else {

const needsRefetch = loadState();
if (needsRefetch && STATE.parsedCards.length > 0 && Object.keys(STATE.scryfallData).length === 0) {
  // We have saved card data but no scryfall — show restoring banner, re-fetch
  const app = $('#app');
  app.innerHTML = '<div class="max-w-3xl mx-auto text-center py-16"><div class="text-mtg-gold font-cinzel text-xl mb-3">Restoring your session...</div><div class="text-mtg-dim text-sm">Re-fetching card data from Scryfall</div></div>';
  (async () => {
    const { data, errors } = await fetchFromScryfall(STATE.parsedCards);
    STATE.scryfallData = data;
    STATE.fetchErrors = errors;
    render();
  })();
} else {
  render();
}

// Also save on beforeunload as a safety net
window.addEventListener('beforeunload', saveState);

} // end else (not shared view)
</script>
