// UNIVERSAL ENGINE INSURANCE — always a candidate regardless of commander
const UNIVERSAL_INSURANCE = {
  name: 'Engine Insurance',
  desc: 'Protection for the commander and key engine pieces, plus tutors to find missing components',
  weight: 1,
  test: (o, t, sd) =>
    /hexproof|indestructible|phase out|shroud|protection from/i.test(o) ||
    /can't be (?:the target|destroyed)/i.test(o) ||
    (/search your library for.*card/i.test(o) && !/basic.*land/i.test(o)) ||
    /counter target spell/i.test(o) ||
    /regenerate|totem armor/i.test(o)
};

// Derive a human-readable engine name from detected signals
function deriveEngineName(signalIds) {
  // Prioritized combos first, then individual signals
  // Token consumption combos (Baylen-style: taps tokens as fuel)
  if (signalIds.includes('tokenConsumption') && signalIds.includes('countersSynergy')) return 'Token / Counters Engine';
  if (signalIds.includes('tokenConsumption')) return 'Token Consumption Engine';
  // ETB / Death doubling (Panharmonicon / Elesh Norn / Teysa Karlov)
  if (signalIds.includes('etbDoubling') && signalIds.includes('deathTrigger')) return 'Death Doubling Engine';
  if (signalIds.includes('etbDoubling') && signalIds.includes('tokenCreation')) return 'ETB / Token Doubling Engine';
  if (signalIds.includes('etbDoubling')) return 'ETB Doubling Engine';
  // Permanent animation (Bello-style: artifacts/enchantments become creatures)
  if (signalIds.includes('permanentAnimation') && signalIds.includes('combatDamage')) return 'Animated Assault Engine';
  if (signalIds.includes('permanentAnimation')) return 'Living Permanents Engine';
  // Sacrifice combos
  if (signalIds.includes('sacrifice') && signalIds.includes('spellCopy')) return 'Spell-Sacrifice Engine';
  if (signalIds.includes('sacrifice') && signalIds.includes('tokenCreation')) return 'Aristocrats / Token Engine';
  if (signalIds.includes('sacrifice')) return 'Aristocrats Engine';
  // Enchantress BEFORE spellslinger (enchantress triggers on cast but is its own archetype)
  if (signalIds.includes('enchantressTrigger')) return 'Enchantress Engine';
  // Spellslinger combos
  if (signalIds.includes('spellCopy') && signalIds.includes('manaGen')) return 'Storm / Spellslinger Engine';
  if (signalIds.includes('spellcastTrigger') && signalIds.includes('manaGen')) return 'Storm / Spellslinger Engine';
  if (signalIds.includes('spellCopy') && signalIds.includes('spellcastTrigger')) return 'Spellslinger Engine';
  if (signalIds.includes('spellcastTrigger') && signalIds.includes('damageAmp')) return 'Burn / Spellslinger Engine';
  if (signalIds.includes('spellCopy') && signalIds.includes('manaGen')) return 'Spell Copy / Storm Engine';
  if (signalIds.includes('spellCopy')) return 'Spell Copy Engine';
  if (signalIds.includes('spellcastTrigger')) return 'Spellslinger Engine';
  // Vehicle
  if (signalIds.includes('vehicleSynergy') && signalIds.includes('exilePlay')) return 'Vehicle Aggro Engine';
  if (signalIds.includes('vehicleSynergy')) return 'Vehicle Engine';
  // Fight / Targeting
  if (signalIds.includes('fightTrigger') && signalIds.includes('targetOwn')) return 'Fight / Targeting Engine';
  if (signalIds.includes('fightTrigger')) return 'Fight Engine';
  if (signalIds.includes('targetOwn')) return 'Heroic / Targeting Engine';
  // Ninjutsu + tribal + topdeck combos
  if (signalIds.includes('ninjutsuSynergy') && signalIds.includes('topdeckMatters')) return 'Ninjutsu / Topdeck Engine';
  if (signalIds.includes('ninjutsuSynergy')) return 'Ninjutsu Engine';
  if (signalIds.includes('topdeckMatters') && signalIds.includes('combatDamage')) return 'Combat / Topdeck Engine';
  // Keyword / ETB / Ability Copy
  if (signalIds.includes('keywordGrant')) return 'Keyword Engine';
  if (signalIds.includes('abilityCopy')) return 'Ability Engine';
  if (signalIds.includes('etbTrigger') && signalIds.includes('reanimateTrigger')) return 'Reanimator Engine';
  if (signalIds.includes('etbTrigger') && signalIds.includes('discardSynergy')) return 'Discard-ETB Engine';
  if (signalIds.includes('etbTrigger') && signalIds.includes('graveyardMatters')) return 'Graveyard / ETB Engine';
  if (signalIds.includes('etbTrigger')) return 'ETB / Blink Engine';
  // Library cheat — put creatures from library onto battlefield
  if (signalIds.includes('libraryCheat')) return 'Library Assault Engine';
  // Token assault (tokens + combat damage, e.g. Sauron amass → combat → trigger)
  if (signalIds.includes('tokenCreation') && signalIds.includes('combatDamage')) return 'Token Assault Engine';
  // Graveyard
  if (signalIds.includes('reanimateTrigger')) return 'Reanimator Engine';
  // Landfall
  if (signalIds.includes('landfallTrigger')) return 'Landfall Engine';
  // Counters
  if (signalIds.includes('countersSynergy') && signalIds.includes('costReduction')) return 'X-Spell / Counters Engine';
  if (signalIds.includes('countersSynergy')) return 'Proliferate / Counters Engine';
  // Planeswalker / Superfriends
  if (signalIds.includes('planeswalkerSynergy') && signalIds.includes('topdeckMatters')) return 'Superfriends Engine';
  if (signalIds.includes('planeswalkerSynergy')) return 'Superfriends Engine';
  // Upkeep matters (Obeka-style: extra upkeep steps)
  if (signalIds.includes('upkeepMatters') && signalIds.includes('combatDamage')) return 'Upkeep Assault Engine';
  if (signalIds.includes('upkeepMatters')) return 'Upkeep Engine';
  // Power matters (Zilortha-style: power determines lethality)
  if (signalIds.includes('powerMatters') && signalIds.includes('fightTrigger')) return 'Power / Fight Engine';
  if (signalIds.includes('powerMatters')) return 'Power Matters Engine';
  // Exile matters (Ketramose-style: exile threshold)
  if (signalIds.includes('exileMatters') && signalIds.includes('combatDamage')) return 'Exile Assault Engine';
  if (signalIds.includes('exileMatters')) return 'Exile Matters Engine';
  // Self-flicker (Norin-style: exile self, return, trigger ETBs)
  if (signalIds.includes('selfFlicker')) return 'Self-Flicker Engine';
  // Punisher (Kaervek-style: opponents take damage for actions)
  if (signalIds.includes('punisher') && signalIds.includes('damageAmp')) return 'Group Slug Engine';
  if (signalIds.includes('punisher')) return 'Punisher Engine';
  // Mill engine
  if (signalIds.includes('millEngine') && signalIds.includes('tribalSynergy')) return 'Mill Tribal Engine';
  if (signalIds.includes('millEngine')) return 'Mill Engine';
  // Poison / Infect
  if (signalIds.includes('poisonInfect') && signalIds.includes('countersSynergy')) return 'Infect / Proliferate Engine';
  if (signalIds.includes('poisonInfect')) return 'Infect Engine';
  // Cascade / Freecast
  if (signalIds.includes('cascadeFreecast') && signalIds.includes('topdeckMatters')) return 'Cascade / Topdeck Engine';
  if (signalIds.includes('cascadeFreecast')) return 'Cascade Engine';
  // Morph / Face-down
  if (signalIds.includes('morphManifest') && signalIds.includes('costReduction')) return 'Morph Engine';
  if (signalIds.includes('morphManifest')) return 'Morph / Manifest Engine';
  // Cycling
  if (signalIds.includes('cyclingMatters') && signalIds.includes('tokenCreation')) return 'Cycling Token Engine';
  if (signalIds.includes('cyclingMatters')) return 'Cycling Engine';
  // Equipment / Voltron combos
  if (signalIds.includes('equipmentMatters') && signalIds.includes('voltronSolo')) return 'Equipment Voltron Engine';
  if (signalIds.includes('equipmentMatters') && signalIds.includes('combatDamage')) return 'Equipment Assault Engine';
  if (signalIds.includes('equipmentMatters')) return 'Equipment Engine';
  if (signalIds.includes('voltronSolo') && signalIds.includes('enchantressTrigger')) return 'Enchantress Voltron Engine';
  if (signalIds.includes('voltronSolo')) return 'Voltron Engine';
  // Death triggers (distinct from sacrifice — cares about ANY death)
  if (signalIds.includes('deathTrigger') && signalIds.includes('tokenCreation')) return 'Death / Token Engine';
  if (signalIds.includes('deathTrigger')) return 'Death Trigger Engine';
  // Clone / Copy
  if (signalIds.includes('clonesCopy') && signalIds.includes('etbTrigger')) return 'Clone / ETB Engine';
  if (signalIds.includes('clonesCopy')) return 'Clone Engine';
  // Flash Matters
  if (signalIds.includes('flashMoment') && signalIds.includes('spellcastTrigger')) return 'Flash Spellslinger Engine';
  if (signalIds.includes('flashMoment')) return 'Flash Engine';
  // Artifact Synergy
  if (signalIds.includes('artifactSynergy') && signalIds.includes('tokenCreation')) return 'Artifact Token Engine';
  if (signalIds.includes('artifactSynergy') && signalIds.includes('sacrifice')) return 'Artifact Aristocrats Engine';
  if (signalIds.includes('artifactSynergy')) return 'Artifact Engine';
  // Remaining singles
  if (signalIds.includes('lifegainPayoff')) return 'Lifegain Engine';
  if (signalIds.includes('combatDamage') && signalIds.includes('exilePlay')) return 'Combat Exile Engine';
  if (signalIds.includes('combatDamage')) return 'Combat Damage Engine';
  if (signalIds.includes('tokenCreation')) return 'Token Engine';
  if (signalIds.includes('damageAmp')) return 'Damage Amplification Engine';
  if (signalIds.includes('tribalSynergy')) return 'Tribal Engine';
  if (signalIds.includes('costReduction')) return 'Cost Reduction Engine';
  if (signalIds.includes('graveyardMatters')) return 'Graveyard Engine';
  if (signalIds.includes('discardSynergy')) return 'Discard Engine';
  if (signalIds.includes('topdeckMatters')) return 'Topdeck Engine';
  if (signalIds.includes('extraTurns')) return 'Temporal Engine';
  if (signalIds.includes('exilePlay')) return 'Exile Engine';
  return 'Custom Strategy';
}

// ============================================================
// SA SUGGESTION ENGINE — compositional, commander-aware
// Reads oracle text → detects mechanical signals → scores role
// candidates by how many deck cards match → returns top 5
// ============================================================
function suggestSecondaryAbilities() {
  const uncategorized = [];
  STATE.parsedCards.forEach(c => {
    if (c.isCommander) return;
    const cat = STATE.categories[c.name];
    if (cat?.primary && ['Ramp','Velocity','Interaction','Wipe','Land'].includes(cat.primary)) return;
    const { oracle, typeLine, sd } = getCardOracleAndType(c.name);
    if (!sd) return;
    uncategorized.push({ name: c.name, oracle, typeLine, sd });
  });

  // ── Get commander oracle text ──
  const cmdr = STATE.parsedCards.find(c => c.isCommander);
  const cmdrSD = cmdr ? STATE.scryfallData[cmdr.name] : null;
  const cmdrOracle = cmdrSD ? (cmdrSD.oracle_text || (cmdrSD.card_faces ? cmdrSD.card_faces.map(f => f.oracle_text || '').join(' ') : '')).toLowerCase() : '';
  const cmdrKeywords = cmdrSD?.keywords?.map(k => k.toLowerCase()) || [];
  const cmdrTypeLine = cmdrSD ? (cmdrSD.type_line || '').toLowerCase() : '';
  const priAbility = (STATE.characterSheet.primaryAbility || '').toLowerCase();
  const combined = cmdrOracle + ' ' + priAbility;

  // ── Phase 1: Detect signals from commander oracle ──
  const detectedSignals = [];
  const allCandidates = [];

  for (const [key, signal] of Object.entries(CMD_SIGNALS)) {
    if (signal.detect(combined, cmdrKeywords, cmdrTypeLine)) {
      detectedSignals.push(key);
      signal.roles.forEach(role => {
        const matches = uncategorized.filter(c => role.test(c.oracle, c.typeLine, c.sd));
        allCandidates.push({
          name: role.name,
          desc: role.desc,
          weight: role.weight,
          test: role.test,
          signalId: key,
          source: 'commander',
          count: matches.length,
          cards: matches.map(c => c.name),
          score: role.weight * Math.max(matches.length, 1)
        });
      });
    }
  }

  // ── Phase 2: Deck-level signal scan ──
  // If the deck has 6+ cards matching a signal's roles that WASN'T detected
  // from the commander oracle, it's a strong deck theme worth suggesting
  for (const [key, signal] of Object.entries(CMD_SIGNALS)) {
    if (detectedSignals.includes(key)) continue;
    let totalMatches = 0;
    const deckRoles = [];
    signal.roles.forEach(role => {
      const matches = uncategorized.filter(c => role.test(c.oracle, c.typeLine, c.sd));
      totalMatches += matches.length;
      if (matches.length >= 3) {
        deckRoles.push({
          name: role.name,
          desc: role.desc,
          weight: role.weight * 0.5, // reduced weight for deck-derived vs commander-derived
          test: role.test,
          signalId: key,
          source: 'deck',
          count: matches.length,
          cards: matches.map(c => c.name),
          score: (role.weight * 0.5) * matches.length
        });
      }
    });
    if (totalMatches >= 6) {
      deckRoles.forEach(r => allCandidates.push(r));
    }
  }

  // ── Phase 3: Add universal Engine Insurance ──
  const insuranceMatches = uncategorized.filter(c => UNIVERSAL_INSURANCE.test(c.oracle, c.typeLine, c.sd));
  allCandidates.push({
    name: UNIVERSAL_INSURANCE.name,
    desc: UNIVERSAL_INSURANCE.desc,
    weight: UNIVERSAL_INSURANCE.weight,
    test: UNIVERSAL_INSURANCE.test,
    signalId: 'universal',
    source: 'universal',
    count: insuranceMatches.length,
    cards: insuranceMatches.map(c => c.name),
    score: UNIVERSAL_INSURANCE.weight * insuranceMatches.length
  });

  // ── Phase 4: Deduplicate by role name, merging scores ──
  const byName = {};
  allCandidates.forEach(c => {
    if (byName[c.name]) {
      byName[c.name].score = Math.max(byName[c.name].score, c.score);
      byName[c.name].count = Math.max(byName[c.name].count, c.count);
      // Prefer commander-sourced descriptions
      if (c.source === 'commander' && byName[c.name].source !== 'commander') {
        byName[c.name].desc = c.desc;
        byName[c.name].source = c.source;
      }
      c.cards.forEach(card => { if (!byName[c.name].cards.includes(card)) byName[c.name].cards.push(card); });
    } else {
      byName[c.name] = { ...c };
    }
  });

  // ── Phase 5: Sort by score, take top 5 ──
  let sorted = Object.values(byName).sort((a, b) => b.score - a.score);

  // Ensure Engine Insurance is in top 5 if commander signals were detected
  // (every engine needs protection) but don't force it above strong deck themes
  if (detectedSignals.length > 0) {
    const insuranceIdx = sorted.findIndex(r => r.name === 'Engine Insurance');
    if (insuranceIdx >= 5) {
      // Move Engine Insurance into slot 5, pushing out the weakest role
      const insurance = sorted.splice(insuranceIdx, 1)[0];
      sorted.splice(4, 0, insurance);
    }
  }

  const top5 = sorted.slice(0, 5);

  // ── Phase 6: Fallback padding if fewer than 5 ──
  if (top5.length < 5) {
    // Fall back to MECH_BUCKET keyword counting for remaining slots
    const usedNames = new Set(top5.map(r => r.name));
    const bucketScored = MECH_BUCKETS.map(b => {
      if (usedNames.has(b.name)) return null;
      const matches = uncategorized.filter(c => b.test(c.oracle, c.typeLine, c.sd));
      return matches.length >= 2 ? { name: b.name, desc: b.desc, count: matches.length, cards: matches.map(c => c.name), score: matches.length, test: b.test, source: 'fallback' } : null;
    }).filter(Boolean).sort((a, b) => b.score - a.score);
    while (top5.length < 5 && bucketScored.length > 0) {
      top5.push(bucketScored.shift());
    }
    // Last resort: generic placeholders
    const generic = [
      { name: 'Synergy Pieces', desc: 'Cards that amplify the commander\'s ability', count: 0, cards: [], test: () => false },
      { name: 'Utility', desc: 'Flexible cards that serve multiple roles', count: 0, cards: [], test: () => false },
      { name: 'Finishers', desc: 'How you close out the game', count: 0, cards: [], test: () => false },
    ];
    while (top5.length < 5 && generic.length > 0) {
      const g = generic.shift();
      if (!top5.some(t => t.name === g.name)) top5.push(g);
    }
  }

  // ── Store results for autoAssign and engine banner ──
  const engineName = detectedSignals.length > 0 ? deriveEngineName(detectedSignals) : null;
  STATE._detectedEngine = engineName ? { name: engineName, signals: detectedSignals } : null;
  STATE._detectedRoles = top5.map(r => ({ name: r.name, test: r.test }));

  return top5.map(r => ({
    name: r.name,
    desc: r.desc + (r.count > 0 ? ` (${r.count} cards: ${r.cards.slice(0, 3).join(', ')}${r.cards.length > 3 ? '...' : ''})` : '')
  }));
}

// ============================================================
// SA AUTO-ASSIGNMENT — runs when entering Step 3
// Assigns uncategorized cards to the user's defined SAs
// ============================================================
function autoAssignSACategories() {
  const cs = STATE.characterSheet;

  // Build a mapping: for each defined SA name, find the best matching test function
  // Priority: 1) Detected role match (from signal analysis), 2) Exact MECH_BUCKET, 3) Fuzzy MECH_BUCKET
  const saBuckets = [];
  const detectedRoles = STATE._detectedRoles || [];
  for (let i = 0; i < 5; i++) {
    const saName = (cs.saNames[i] || '').toLowerCase().trim();
    if (!saName) continue;

    // First: check if this SA name matches a detected role from signal analysis
    if (detectedRoles.length > 0) {
      const exactRole = detectedRoles.find(r => r.name.toLowerCase() === saName);
      if (exactRole && exactRole.test) {
        saBuckets.push({ saKey: `SA-${i+1}`, bucket: { name: exactRole.name, test: exactRole.test }, priority: i });
        continue;
      }
      // Fuzzy match against detected roles
      const fuzzyRole = detectedRoles.find(r =>
        r.name.toLowerCase().includes(saName) || saName.includes(r.name.toLowerCase())
      );
      if (fuzzyRole && fuzzyRole.test) {
        saBuckets.push({ saKey: `SA-${i+1}`, bucket: { name: fuzzyRole.name, test: fuzzyRole.test }, priority: i });
        continue;
      }
    }

    // Fallback: match against generic MECH_BUCKETS
    const bucket = MECH_BUCKETS.find(b => b.name.toLowerCase() === saName);
    if (bucket) {
      saBuckets.push({ saKey: `SA-${i+1}`, bucket, priority: i });
    } else {
      // Fuzzy match: check if the SA name is a substring of a bucket name or vice versa
      const fuzzy = MECH_BUCKETS.find(b =>
        b.name.toLowerCase().includes(saName) || saName.includes(b.name.toLowerCase())
      );
      if (fuzzy) saBuckets.push({ saKey: `SA-${i+1}`, bucket: fuzzy, priority: i });
    }
  }

  // Helper: check if a card matches Ramp/Velocity/Interaction/Wipe detection
  function detectCoreCategory(oracle, typeLine, sd, frontType) {
    const ft = frontType || typeLine;
    const isInstant = ft.includes('instant') || /flash/i.test(oracle);
    const hits = [];
    // Ramp
    if (/\{t\}:? add \{/.test(oracle) || /\{t\}:? add one mana/.test(oracle) || /add (?:one|two|three) mana/i.test(oracle) ||
        /search your library for (?:a |an? )?(?:basic )?(?:land|forest|plains|island|swamp|mountain)/i.test(oracle) ||
        (/put (?:that|it|them) onto the battlefield/i.test(oracle) && /land/i.test(oracle)) ||
        (sd?.produced_mana && sd.produced_mana.length > 0 && !ft.includes('land')) ||
        /treasure token/i.test(oracle) || /untap (?:all|target) land/i.test(oracle) ||
        /cost.*(?:less|\{1\} less|\{2\} less)/i.test(oracle)) hits.push('Ramp');
    // Velocity
    if (/draw (?:two|three|four|2|3|4|x) cards/i.test(oracle) ||
        (/draw a card/i.test(oracle) && /whenever|at the beginning|each|upkeep/i.test(oracle)) ||
        /draw cards equal/i.test(oracle) || /whenever.*dies.*draw/i.test(oracle) ||
        (/exile the top.*you may (?:play|cast)/i.test(oracle)) ||
        (/draw a card.*lose.*life/i.test(oracle) && /each|whenever|beginning/i.test(oracle))) hits.push('Velocity');
    // Interaction
    if (/counter target spell/i.test(oracle) || /destroy target (?:creature|artifact|enchantment|permanent)/i.test(oracle) ||
        /exile target (?:creature|permanent|artifact|enchantment)/i.test(oracle) ||
        /fights? target/i.test(oracle) || /target.*gets? -\d+\/-\d+/i.test(oracle)) hits.push('Interaction');
    return hits;
  }

  // For each non-land, non-commander card, try to assign to an SA if uncategorized
  STATE.parsedCards.forEach(c => {
    if (c.isCommander) return;
    if (STATE.userEdited[c.name]) return; // Skip cards the user manually edited
    const existing = STATE.categories[c.name];
    const { oracle, typeLine, sd } = getCardOracleAndType(c.name);
    if (!sd) return;

    // If card has no primary category, try to assign it to a matching SA
    // Multi-match scoring: test ALL buckets, pick the one with fewest assigned cards (load balancing)
    if (!existing?.primary || existing.primary === '') {
      const matchingBuckets = saBuckets.filter(({ bucket }) => bucket.test(oracle, typeLine, sd));
      if (matchingBuckets.length === 1) {
        STATE.categories[c.name] = { primary: matchingBuckets[0].saKey, secondary: existing?.secondary || '' };
      } else if (matchingBuckets.length > 1) {
        // Pick the SA with the fewest cards assigned so far (load balance)
        const saCounts = {};
        matchingBuckets.forEach(({ saKey }) => { saCounts[saKey] = 0; });
        STATE.parsedCards.forEach(pc => {
          const pCat = STATE.categories[pc.name];
          if (pCat?.primary && saCounts[pCat.primary] !== undefined) saCounts[pCat.primary]++;
        });
        const best = matchingBuckets.sort((a, b) => (saCounts[a.saKey] || 0) - (saCounts[b.saKey] || 0))[0];
        STATE.categories[c.name] = { primary: best.saKey, secondary: existing?.secondary || '' };
      }
    }

    // If card HAS a primary category but no secondary, try to find one:
    if (STATE.categories[c.name]?.primary && !STATE.categories[c.name]?.secondary) {
      const pri = STATE.categories[c.name].primary;
      let foundSec = '';

      // Check 1: Does this card match any SA bucket?
      for (const { saKey, bucket } of saBuckets) {
        if (saKey === pri) continue;
        if (bucket.test(oracle, typeLine, sd)) {
          foundSec = saKey;
          break;
        }
      }

      // Check 2: If primary is an SA, check if card also qualifies as Ramp/Velocity/Interaction
      if (!foundSec && pri.startsWith('SA-')) {
        const frontType = sd?.card_faces ? (sd.card_faces[0]?.type_line || '').toLowerCase() : typeLine;
        const coreHits = detectCoreCategory(oracle, typeLine, sd, frontType);
        if (coreHits.length > 0) foundSec = coreHits[0];
      }

      // Check 3: If primary is a core category, also check SA buckets
      if (!foundSec && ['Ramp','Velocity','Interaction','Wipe'].includes(pri)) {
        for (const { saKey, bucket } of saBuckets) {
          if (bucket.test(oracle, typeLine, sd)) {
            foundSec = saKey;
            break;
          }
        }
      }

      // Check 4: Cross-core secondary (e.g., Ramp card that also draws = secondary Velocity)
      if (!foundSec && ['Ramp','Velocity','Interaction','Wipe'].includes(pri)) {
        const frontType = sd?.card_faces ? (sd.card_faces[0]?.type_line || '').toLowerCase() : typeLine;
        const coreHits = detectCoreCategory(oracle, typeLine, sd, frontType);
        for (const hit of coreHits) {
          if (hit !== pri) { foundSec = hit; break; }
        }
      }

      if (foundSec) {
        STATE.categories[c.name].secondary = foundSec;
        if (STATE.fingers[c.name]) STATE.fingers[c.name].dc = 1;
      }
    }
  });
}

// ============================================================
// CALCULATIONS
// ============================================================
function calcCategoryCounts() {
  const counts = {};
  CATEGORIES.forEach(c => counts[c] = 0);
  const nonLand = getNonLandCards();
  // Auto-count lands
  counts['Land'] = getLandCards().reduce((s,c) => s + c.qty, 0);
  nonLand.forEach(c => {
    const cat = STATE.categories[c.name];
    if (cat?.primary && counts[cat.primary] !== undefined) counts[cat.primary] += c.qty;
    if (cat?.secondary && cat.secondary !== cat.primary && counts[cat.secondary] !== undefined) counts[cat.secondary] += c.qty;
  });
  return counts;
}

function calcAvgMV() {
  const nonLand = getNonLandCards();
  let total = 0, count = 0;
  nonLand.forEach(c => {
    const sd = STATE.scryfallData[c.name];
    if (sd) { total += sd.cmc * c.qty; count += c.qty; }
  });
  return count > 0 ? (total / count).toFixed(2) : '0.00';
}

function calcFingerAverages() {
  const nonLand = getNonLandCards();
  let totalScore = 0, count = 0;
  nonLand.forEach(c => {
    const f = STATE.fingers[c.name];
    if (f) {
      totalScore += (f.cs || 0) + (f.dc || 0) + (f.wc || 0) + (f.iv || 0) + (f.tf || 0);
      count++;
    }
  });
  return count > 0 ? (totalScore / count).toFixed(2) : '0.00';
}

function calcSD() {
  const nonLand = getNonLandCards();
  let cs = 0, total = 0;
  nonLand.forEach(c => { const f = STATE.fingers[c.name]; if (f) { cs += f.cs; total++; } });
  return total > 0 ? ((cs / total) * 100).toFixed(1) : '0.0';
}

function calcCI() {
  const nonLand = getNonLandCards();
  let iv = 0, total = 0;
  nonLand.forEach(c => { const f = STATE.fingers[c.name]; if (f) { iv += f.iv; total++; } });
  return total > 0 ? ((iv / total) * 100).toFixed(1) : '0.0';
}

function calcCCP() {
  const nonLand = getNonLandCards();
  let dc = 0, total = 0;
  nonLand.forEach(c => { const f = STATE.fingers[c.name]; if (f) { dc += f.dc; total++; } });
  return total > 0 ? ((dc / total) * 100).toFixed(1) : '0.0';
}


function getSDGrade(pct) {
  if (pct <= 20) return 'F'; if (pct <= 35) return 'D'; if (pct <= 50) return 'C';
  if (pct <= 65) return 'B'; if (pct <= 80) return 'A'; return 'S';
}
function getCIGrade(pct) {
  if (pct <= 30) return 'F'; if (pct <= 50) return 'D'; if (pct <= 65) return 'C';
  if (pct <= 80) return 'B'; if (pct <= 95) return 'A'; return 'S';
}
function getCCPGrade(pct) {

  if (pct <= 45) return 'B'; if (pct <= 60) return 'A'; return 'S';
}

function gradeColor(g) {

}

function drawRadarChart(canvasEl, scores) {
  const ctx = canvasEl.getContext('2d');
  const w = canvasEl.width;
  const h = canvasEl.height;
  const centerX = w / 2;
  const centerY = h / 2;
  const radius = 120;
  const levels = 5;

  // Pentagon vertices: 5 axes
  const angles = [0, 1, 2, 3, 4].map(i => (i * 2 * Math.PI / 5) - Math.PI / 2);
  const axisLabels = ['SD', 'CI', 'CCP', 'ED', 'RI'];
  const scoreValues = [scores.sd, scores.ci, scores.ccp, scores.ed, scores.ri];

  // Helper: convert polar to cartesian
  const polarToCart = (angle, dist) => ({
    x: centerX + dist * Math.cos(angle),
    y: centerY + dist * Math.sin(angle)
  });

  // Clear canvas
  ctx.fillStyle = 'transparent';
  ctx.clearRect(0, 0, w, h);

  // Draw grid: 5 concentric pentagons at 20%, 40%, 60%, 80%, 100%
  ctx.strokeStyle = '#2a2f3e';
  ctx.lineWidth = 1;
  for (let level = 1; level <= levels; level++) {
    const levelRadius = (radius * level) / levels;
    ctx.beginPath();
    angles.forEach((angle, i) => {
      const p = polarToCart(angle, levelRadius);
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    });
    ctx.closePath();
    ctx.stroke();
  }

  // Draw axis lines from center to vertices
  ctx.strokeStyle = '#2a2f3e';
  ctx.lineWidth = 1;
  angles.forEach(angle => {
    const p = polarToCart(angle, radius);
    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  });

  // Draw data polygon: semi-transparent gold fill with gold border
  ctx.fillStyle = 'rgba(212, 168, 67, 0.15)';
  ctx.strokeStyle = '#d4a843';
  ctx.lineWidth = 2;
  ctx.beginPath();
  scoreValues.forEach((val, i) => {
    const normalizedVal = Math.min(val, 100);
    const dist = (normalizedVal / 100) * radius;
    const p = polarToCart(angles[i], dist);
    if (i === 0) ctx.moveTo(p.x, p.y);
    else ctx.lineTo(p.x, p.y);
  });
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Draw vertex dots: small gold circles
  ctx.fillStyle = '#d4a843';
  scoreValues.forEach((val, i) => {
    const normalizedVal = Math.min(val, 100);
    const dist = (normalizedVal / 100) * radius;
    const p = polarToCart(angles[i], dist);
    ctx.beginPath();
    ctx.arc(p.x, p.y, 4, 0, 2 * Math.PI);
    ctx.fill();
  });

  // Draw axis labels at vertices: white text
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  angles.forEach((angle, i) => {
    const labelDist = radius + 25;
    const p = polarToCart(angle, labelDist);
    ctx.fillText(axisLabels[i], p.x, p.y);
  });

  // Draw percentage labels next to data points
  ctx.fillStyle = '#d4a843';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  scoreValues.forEach((val, i) => {
    const normalizedVal = Math.min(val, 100);
    const dist = (normalizedVal / 100) * radius;
    const p = polarToCart(angles[i], dist);
    const offset = 18;
    const labelP = polarToCart(angles[i], dist + offset);
    ctx.fillText(`${Math.round(normalizedVal)}%`, labelP.x, labelP.y);
  });
}

function getTierBadgeInfo() {
  const avgFinger = parseFloat(calcFingerAverages());
  let tier, tierColor, tierBgColor;

  if (avgFinger <= 1.5) {
    tier = 'Synergy Soup';
    tierColor = '#ef4444';
    tierBgColor = 'rgba(239, 68, 68, 0.1)';
  } else if (avgFinger <= 2.5) {
    tier = 'Standard';
    tierColor = '#eab308';
    tierBgColor = 'rgba(234, 179, 8, 0.1)';
  } else if (avgFinger <= 3.5) {
    tier = 'Focused';
    tierColor = '#22c55e';
    tierBgColor = 'rgba(34, 197, 94, 0.1)';
  } else if (avgFinger <= 4.5) {
    tier = 'Engine Online';
    tierColor = '#3b82f6';
    tierBgColor = 'rgba(59, 130, 246, 0.1)';
  } else {
    tier = 'Inevitability Machine';
    tierColor = '#a855f7';
    tierBgColor = 'rgba(168, 85, 247, 0.1)';
  }

  return { tier, tierColor, tierBgColor, avgFinger };
}

function checkPillars() {
  const flags = [];
  const counts = calcCategoryCounts();
  const nonLand = getNonLandCards();
  const profile = getProfile();
  const bracketLabel = STATE.characterSheet.bracket ? `Bracket ${STATE.characterSheet.bracket}` : 'your bracket';

  // Pillar 1: Macro-Unfocus — uncategorized cards
  const uncategorized = nonLand.filter(c => !STATE.categories[c.name]?.primary);
  if (uncategorized.length > 3) flags.push({ pillar: 1, label: 'Macro-Unfocus', msg: `${uncategorized.length} cards have no category assigned. Every non-land card must fit a defined role.` });

  // Pillar 3: Reactive Illusion — interaction exceeds velocity
  if (counts['Interaction'] > profile.interaction[1] && counts['Velocity'] < profile.velocity[0]) {
    flags.push({ pillar: 3, label: 'Reactive Illusion', msg: `Interaction (${counts['Interaction']}) exceeds ${profile.interaction[1]} while Velocity (${counts['Velocity']}) is below ${profile.velocity[0]}. Early game is reactive, not proactive.` });
  }

  // Pillar 4: Top-Down Trap
  const ci = parseFloat(calcCI());
  if (ci < 50) flags.push({ pillar: 4, label: 'Top-Down Trap', msg: `Commander Independence at ${ci}% — too many cards are dead without the commander.` });

  // Framework ratio checks — bracket-aware
  if (counts['Velocity'] < profile.velocity[0]) flags.push({ pillar: 0, label: 'Velocity Shortfall', msg: `Velocity at ${counts['Velocity']}/${profile.velocity[0]} minimum for ${bracketLabel}. Card draw engine is underpowered.` });
  if (counts['Ramp'] < profile.ramp[0]) flags.push({ pillar: 0, label: 'Ramp Shortfall', msg: `Ramp at ${counts['Ramp']}/${profile.ramp[0]} minimum for ${bracketLabel}. Mana acceleration is insufficient.` });
  if (counts['Land'] < profile.lands[0]) flags.push({ pillar: 0, label: 'Land Shortfall', msg: `Lands at ${counts['Land']}/${profile.lands[0]} minimum for ${bracketLabel}. Mana base is too thin.` });
  if (counts['Land'] > profile.lands[1]) flags.push({ pillar: 0, label: 'Land Excess', msg: `Lands at ${counts['Land']}/${profile.lands[1]} max for ${bracketLabel}. Too many land slots consuming spell slots.` });

  // MV curve check — bracket-aware
  const avgMV = parseFloat(calcAvgMV());
  if (avgMV > profile.mvTarget[1]) flags.push({ pillar: 0, label: 'High MV Curve', msg: `Average non-land MV is ${avgMV}. Target is ${profile.mvTarget[0]}-${profile.mvTarget[1]} for ${bracketLabel}.` });

  // Smart land warning — even within bracket range, flag if lands are low relative to curve
  const landRec = recommendedLands();
  if (counts['Land'] < landRec.recommended && counts['Land'] >= profile.lands[0]) {
    flags.push({ pillar: 0, label: 'Land Warning', msg: `Lands at ${counts['Land']} — technically within ${bracketLabel} range, but with avg MV ${landRec.avgMV} and ${landRec.rampCount} ramp sources, recommend ${landRec.recommended} lands for consistency.` });
  }

  return flags;
}

// RENDER ENGINE
// ============================================================
function render() {
  renderStepNav();
  const app = $('#app');
  app.innerHTML = '';
  const renderers = [renderImport, renderCharacterSheet, renderCategorize, renderScore, renderResults, renderExport];
  renderers[STATE.step]();
}

function renderStepNav() {
  const nav = $('#step-nav');
  nav.innerHTML = '';
  STEPS.forEach((s, i) => {
    const dot = el('div', {
      className: `step-dot rounded-full flex items-center justify-center font-bold cursor-pointer border-2 transition-all text-[0.6rem] w-6 h-6 sm:w-8 sm:h-8 sm:text-xs ${i === STATE.step ? 'active border-mtg-gold text-mtg-dark' : i < STATE.step ? 'done border-green-500 text-white' : 'border-mtg-border text-mtg-dim'}`,
      onClick: () => { if (i <= STATE.step || i <= furthestStep()) { STATE.step = i; render(); } },
      'data-tip': s.label
    }, [s.icon]);
    dot.classList.add('tooltip');
    nav.appendChild(dot);
    if (i < STEPS.length - 1) nav.appendChild(el('div', { className: 'step-connector w-3 sm:w-6 h-px bg-mtg-border' }));
  });
  // Show/hide New Audit button based on whether there's active data
  const newBtn = document.getElementById('new-audit-btn');
  if (newBtn) newBtn.classList.toggle('hidden', STATE.parsedCards.length === 0);
}

function furthestStep() {
  // Allow navigating back to completed steps
  if (Object.keys(STATE.scryfallData).length === 0) return 0;
  if (!STATE.characterSheet.commanderName) return 1;
  return 5;
}

function navButtons(canBack, canNext, nextLabel = 'Continue', onNext = null) {
  const div = el('div', { className: 'nav-buttons flex flex-col-reverse sm:flex-row justify-between mt-8 pt-4 border-t border-mtg-border gap-3' });
  if (canBack) {
    div.appendChild(el('button', {
      className: 'px-5 py-2 rounded border border-mtg-border text-mtg-dim hover:text-white hover:border-mtg-gold transition',
      onClick: () => { STATE.step--; render(); }
    }, ['Back']));
  } else {
    div.appendChild(el('div'));
  }
  if (canNext) {
    div.appendChild(el('button', {
      className: 'px-6 py-2 rounded bg-mtg-gold text-mtg-dark font-semibold hover:bg-mtg-accent transition',
      onClick: () => { if (onNext) onNext(); STATE.step++; render(); }
    }, [nextLabel]));
  }
  return div;
}

  container.appendChild(textarea);

  // Status
  const status = el('div', { id: 'import-status', className: 'mt-4 text-sm' });
  container.appendChild(status);

  // Fetch button
  const btn = el('button', {
    className: 'mt-4 px-6 py-3 rounded-lg bg-mtg-gold text-mtg-dark font-semibold hover:bg-mtg-accent transition text-sm',
    onClick: async () => {
      const text = textarea.value;
      if (!text.trim()) { status.innerHTML = '<span class="text-red-400">Please paste a deck list first.</span>'; return; }
      STATE.rawText = text;
      STATE.commanderInput = cmdrInput.value.trim();
      STATE.parsedCards = parseDeckList(text);

      // === DEDUP: Merge duplicate card entries by name ===
      const deduped = new Map();
      STATE.parsedCards.forEach(c => {
        const key = c.name.toLowerCase();
        if (deduped.has(key)) {
          const existing = deduped.get(key);
          existing.qty += c.qty;
          if (c.isCommander) existing.isCommander = true;
        } else {
          deduped.set(key, { ...c });
        }
      });
      STATE.parsedCards = [...deduped.values()];

      // If commander was typed in the dedicated box, mark it
      if (STATE.commanderInput) {
        STATE.parsedCards.forEach(c => c.isCommander = false);
        const cmdrFront = frontFaceName(STATE.commanderInput);
        const existing = STATE.parsedCards.find(c =>
          c.name.toLowerCase() === STATE.commanderInput.toLowerCase() ||
          frontFaceName(c.name).toLowerCase() === cmdrFront.toLowerCase()
        );
        if (existing) {
          existing.isCommander = true;
        } else {
          STATE.parsedCards.unshift({ qty: 1, name: STATE.commanderInput, isCommander: true });
        }
      }

      if (STATE.parsedCards.length === 0) { status.innerHTML = '<span class="text-red-400">Could not parse any cards. Check format.</span>'; return; }

      status.innerHTML = `<span class="text-mtg-gold">Fetching ${STATE.parsedCards.length} cards from Scryfall...</span>`;
      btn.disabled = true;
      btn.textContent = 'Fetching...';

      const { data, errors } = await fetchFromScryfall(STATE.parsedCards);
      STATE.scryfallData = data;
      STATE.fetchErrors = errors;

      // If the commander wasn't found by exact name (e.g., user typed "Ezuri"),
      // try Scryfall's fuzzy search to resolve to the full card name
      const cmdrCard = STATE.parsedCards.find(c => c.isCommander);
      if (cmdrCard && !data[cmdrCard.name]) {
        try {
          const fuzzyResp = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(cmdrCard.name)}`);
          if (fuzzyResp.ok) {
            const fuzzyData = await fuzzyResp.json();
            data[cmdrCard.name] = fuzzyData;
            data[fuzzyData.name] = fuzzyData;
            const oldName = cmdrCard.name;
            cmdrCard.name = fuzzyData.name;
            STATE.scryfallData = data;
            const errIdx = errors.indexOf(oldName);
            if (errIdx > -1) errors.splice(errIdx, 1);
          } else {
            // Fuzzy failed (ambiguous name like "Ezuri" matching multiple cards)
            // Try autocomplete → fetch each match → pick the first legendary creature
            const acResp = await fetch(`https://api.scryfall.com/cards/autocomplete?q=${encodeURIComponent(cmdrCard.name)}`);
            if (acResp.ok) {
              const acData = await acResp.json();
              // Filter to names that start with what the user typed (likely the commander, not "Ezuri's Predation")
              const candidates = (acData.data || []).filter(n => n.toLowerCase().startsWith(cmdrCard.name.toLowerCase()));
              if (candidates.length > 0) {
                // Fetch all candidates to find the legendary creature(s)
                const candResp = await fetch('https://api.scryfall.com/cards/collection', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ identifiers: candidates.map(n => ({ name: n })) })
                });
                if (candResp.ok) {
                  const candData = await candResp.json();
                  const legendaries = (candData.data || []).filter(c => /legendary creature/i.test(c.type_line));
                  if (legendaries.length === 1) {
                    // Exactly one legendary creature match — use it
                    const resolved = legendaries[0];
                    const oldName = cmdrCard.name;
                    data[oldName] = resolved;
                    data[resolved.name] = resolved;
                    cmdrCard.name = resolved.name;
                    STATE.scryfallData = data;
                    const errIdx = errors.indexOf(oldName);
                    if (errIdx > -1) errors.splice(errIdx, 1);
                  } else if (legendaries.length > 1) {
                    // Multiple legendary creatures — store them so Step 2 can offer a picker
                    STATE.cmdrCandidates = legendaries;
                    legendaries.forEach(c => { data[c.name] = c; });
                    // Default to first one for now
                    const resolved = legendaries[0];
                    data[cmdrCard.name] = resolved;
                    cmdrCard.name = resolved.name;
                    STATE.scryfallData = data;
                  }
                }
              }
            }
          }
        } catch(e) { /* fuzzy/autocomplete failed, continue with what we have */ }
      }

      // If no commander was specified in the dedicated box, try to auto-detect from card data
      if (!STATE.parsedCards.some(c => c.isCommander)) {
        for (const c of STATE.parsedCards) {
          const sd = data[c.name];
          if (sd && sd.type_line && /legendary creature/i.test(sd.type_line)) {
            c.isCommander = true;
            break;
          }
        }
      }

      // Auto-fill character sheet commander name
      const cmdr = STATE.parsedCards.find(c => c.isCommander);
      if (cmdr) STATE.characterSheet.commanderName = cmdr.name;

      // === AUTO-CATEGORIZE all cards using Scryfall data ===
      STATE.categories = {}; // reset on re-fetch
      STATE.parsedCards.forEach(c => {
        const cat = autoCategorize(c.name, c.isCommander);
        if (cat) STATE.categories[c.name] = cat;
      });

      // Initialize finger scores and auto-score what we can
      STATE.fingers = {};
      getNonLandCards().forEach(c => {
        STATE.fingers[c.name] = autoScoreFingers(c.name);
      });

      let msg = `<span class="text-green-400">Found ${STATE.parsedCards.length} cards.</span>`;
      const detectedCmdr = STATE.parsedCards.find(c => c.isCommander);
      if (detectedCmdr) msg += `<br><span class="text-mtg-gold">Commander: ${detectedCmdr.name}</span>`;
      const landCount = STATE.parsedCards.filter(c => isLandCard(c.name)).reduce((s,c) => s+c.qty, 0);
      const nonLandCount = getNonLandCards().reduce((s,c) => s+c.qty, 0);
      msg += `<br><span class="text-mtg-dim">${nonLandCount} spells · ${landCount} lands</span>`;
      if (errors.length > 0) {
        msg += `<br><span class="text-yellow-400">Could not find: ${errors.join(', ')}</span>`;
        msg += `<br><span class="text-mtg-dim text-xs">These cards will be skipped. Check spelling or try re-fetching.</span>`;
      }
      status.innerHTML = msg;
      btn.disabled = false;
      btn.textContent = 'Fetch Card Data';

      // Show continue
      const existingNav = container.querySelector('.nav-btns');
      if (existingNav) existingNav.remove();
      const nav = navButtons(false, true);
      nav.classList.add('nav-btns');
      container.appendChild(nav);
    }
  }, ['Fetch Card Data']);
  container.appendChild(btn);

  // If already fetched, show continue
  if (Object.keys(STATE.scryfallData).length > 0) {
    status.innerHTML = `<span class="text-green-400">${Object.keys(STATE.scryfallData).length} cards loaded.</span>`;
    container.appendChild(navButtons(false, true));
  }

  // ==========================================
  // STANDALONE SWP EXPLORER — Five-Finger Card Evaluator
  // ==========================================

// ============================================================
// STANDALONE FIVE-FINGER EXPLORER — Card evaluation without full deck
// ============================================================
async function runExplorerEval(cmdrName, cardName, resultsEl, btn) {
  resultsEl.innerHTML = '';
  if (!cardName) { resultsEl.innerHTML = '<span class="text-red-400 text-sm">Please enter a card name to evaluate.</span>'; return; }

  btn.disabled = true;
  btn.textContent = 'Fetching...';
  resultsEl.innerHTML = '<span class="text-mtg-gold text-sm">Looking up card data...</span>';

  try {
    // Fetch the card to evaluate
    const cardResp = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(cardName)}`);
    if (!cardResp.ok) throw new Error(`Card "${cardName}" not found. Check spelling.`);
    const cardData = await cardResp.json();

    // Fetch commander if provided
    let cmdrData = null;
    if (cmdrName) {
      const cmdrResp = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(cmdrName)}`);
      if (cmdrResp.ok) cmdrData = await cmdrResp.json();
    }

    // Score the card using a standalone evaluation
    const scores = explorerScoreCard(cardData, cmdrData);
    const total = scores.cs + scores.dc + scores.wc + scores.iv + scores.tf;

    resultsEl.innerHTML = '';

    // Card header with image
    const header = el('div', { className: 'flex gap-4 mb-4 mt-3' });
    const imgUrl = cardData.image_uris?.normal || cardData.card_faces?.[0]?.image_uris?.normal;
    if (imgUrl) {
      const img = el('img', { src: imgUrl, className: 'w-32 rounded-lg shadow-lg flex-shrink-0' });
      img.alt = cardData.name;
      header.appendChild(img);
    }
    const info = el('div', { className: 'flex-1 min-w-0' });
    info.appendChild(el('div', { className: 'font-cinzel text-lg text-white mb-1' }, [cardData.name]));
    info.appendChild(el('div', { className: 'text-xs text-mtg-dim mb-1' }, [cardData.type_line || '']));
    info.appendChild(el('div', { className: 'text-xs text-mtg-dim mb-2' }, [`MV ${cardData.cmc || 0}`]));
    if (cmdrData) {
      info.appendChild(el('div', { className: 'text-xs text-mtg-gold mb-2' }, [`Evaluating against: ${cmdrData.name}`]));
    } else {
      info.appendChild(el('div', { className: 'text-xs text-orange-400 mb-2' }, ['No commander context — CS score may be 0. Add a commander above for full evaluation.']));
    }
    // Total score badge
    const totalColor = total >= 4 ? '#22c55e' : total >= 3 ? '#eab308' : total >= 2 ? '#f97316' : '#ef4444';
    info.appendChild(el('div', { className: 'inline-block px-3 py-1 rounded-full font-bold text-sm', style: `background:${totalColor}22; color:${totalColor}; border:1px solid ${totalColor}44` }, [`${total.toFixed(1)} / 5`]));
    header.appendChild(info);
    resultsEl.appendChild(header);

    // Five-finger breakdown
    const fingerGrid = el('div', { className: 'grid grid-cols-1 sm:grid-cols-5 gap-2 mb-4' });
    const fingerDefs = [
      { key: 'cs', abbr: 'CS', name: 'Commander Signal', desc: scores._reasons.cs },
      { key: 'dc', abbr: 'DC', name: 'Dual-Category', desc: scores._reasons.dc },
      { key: 'wc', abbr: 'WC', name: 'Web Connected', desc: scores._reasons.wc },
      { key: 'iv', abbr: 'IV', name: 'Independent Value', desc: scores._reasons.iv },
      { key: 'tf', abbr: 'TF', name: 'Temporal Fit', desc: scores._reasons.tf }
    ];
    fingerDefs.forEach(fd => {
      const val = scores[fd.key];
      const fColor = val >= 1 ? '#22c55e' : val >= 0.5 ? '#eab308' : '#ef4444';
      const fCard = el('div', { className: 'p-3 rounded-lg border text-center', style: `border-color:${fColor}44; background:${fColor}08` });
      fCard.appendChild(el('div', { className: 'font-bold text-sm mb-0.5', style: `color:${fColor}` }, [`${fd.abbr}: ${val}`]));
      fCard.appendChild(el('div', { className: 'text-[10px] text-white mb-1' }, [fd.name]));
      fCard.appendChild(el('div', { className: 'text-[10px] text-mtg-dim' }, [fd.desc]));
      fingerGrid.appendChild(fCard);
    });
    resultsEl.appendChild(fingerGrid);

    // Teaching tip
    const tipBox = el('div', { className: 'p-3 rounded border border-mtg-border bg-mtg-dark/40 text-xs text-mtg-dim' });
    if (total >= 4) {
      tipBox.textContent = 'This card scores exceptionally well. Cards like this are the backbone of a well-built deck — they earn their slot on multiple axes.';
    } else if (total >= 3) {
      tipBox.textContent = 'Solid card with good multi-axis value. Most 99-card slots should aim for 3+ on the Five-Finger scale. Look at any 0-scoring fingers for potential upgrades.';
    } else if (total >= 2) {
      tipBox.textContent = 'This card has room for improvement. Consider whether a similar card exists that scores higher — especially one that picks up the missing fingers.';
    } else {
      tipBox.textContent = 'Low score suggests this card may not be earning its slot. Every card in the 99 competes for limited space — consider replacements that better serve your commander\'s strategy.';
    }
    resultsEl.appendChild(tipBox);

  } catch (e) {
    resultsEl.innerHTML = `<span class="text-red-400 text-sm">${e.message}</span>`;
  }
  btn.disabled = false;
  btn.textContent = 'Evaluate';
}

function explorerScoreCard(cardData, cmdrData) {
  const scores = { cs: 0, dc: 0, wc: 0, iv: 0, tf: 0, _reasons: { cs: '', dc: '', wc: '', iv: '', tf: '' } };
  const oracle = (cardData.oracle_text || (cardData.card_faces ? cardData.card_faces[0]?.oracle_text || '' : '')).toLowerCase();
  const typeLine = (cardData.type_line || '').toLowerCase();
  const cardMV = cardData.cmc || 0;
  const cardKeywords = cardData.keywords?.map(k => k.toLowerCase()) || [];

  // ── CS (Commander Signal) ──
  if (cmdrData) {
    const cmdrOracle = (cmdrData.oracle_text || (cmdrData.card_faces ? cmdrData.card_faces[0]?.oracle_text || '' : '')).toLowerCase();
    const cmdrKeywords = cmdrData.keywords?.map(k => k.toLowerCase()) || [];
    const cmdrTypeLine = (cmdrData.type_line || '').toLowerCase();

    // Extract commander themes
    const themes = [];
    cmdrKeywords.forEach(kw => themes.push(kw));
    if (/landfall|whenever a land.*enters/i.test(cmdrOracle)) themes.push('landfall', 'land-enters');
    if (/deals? \d+ damage to each opponent/i.test(cmdrOracle)) themes.push('damage-opponents', 'burn');
    if (/draw a card/i.test(cmdrOracle)) themes.push('draw');
    if (/create.*token/i.test(cmdrOracle)) themes.push('tokens');
    if (/\+1\/\+1 counter|proliferate/i.test(cmdrOracle)) themes.push('counters');
    if (/sacrifice/i.test(cmdrOracle)) themes.push('sacrifice');
    if (/graveyard/i.test(cmdrOracle)) themes.push('graveyard');
    if (/combat|attack|dealing combat damage/i.test(cmdrOracle)) themes.push('combat');
    if (/whenever you cast/i.test(cmdrOracle)) themes.push('cast-trigger');
    if (/whenever.*dies/i.test(cmdrOracle)) themes.push('death-trigger');
    if (/enchant|aura|constellation/i.test(cmdrOracle)) themes.push('enchantments');
    if (/artifact|equipment/i.test(cmdrOracle) || /artifact/i.test(cmdrTypeLine)) themes.push('artifacts');
    if (/copy|clone/i.test(cmdrOracle)) themes.push('copy');
    if (/life.*gain|you gain.*life/i.test(cmdrOracle)) themes.push('lifegain');
    if (/infect|toxic|poison/i.test(cmdrOracle)) themes.push('poison');
    if (/morph|manifest|disguise|cloak/i.test(cmdrOracle)) themes.push('morph');
    if (/flash|whenever.*cast.*instant|your turn/i.test(cmdrOracle)) themes.push('flash');
    if (/cycling|cycle/i.test(cmdrOracle)) themes.push('cycling');

    let csHit = false;
    if ((themes.includes('landfall') || themes.includes('land-enters')) && /landfall|whenever a land.*enters|additional land|play.*land|put.*land.*onto the battlefield|search your library for.*land.*onto/i.test(oracle)) csHit = true;
    if ((themes.includes('damage-opponents') || themes.includes('burn')) && /deals?.*damage.*(?:plus|additional|\+|instead|more)|double.*damage|damage to each opponent/i.test(oracle)) csHit = true;
    if (themes.includes('tokens') && /create.*token/i.test(oracle)) csHit = true;
    if (themes.includes('counters') && /\+1\/\+1 counter|proliferate|-1\/-1 counter/i.test(oracle)) csHit = true;
    if (themes.includes('sacrifice') && /sacrifice.*(?:draw|gain|deal|create|add)|whenever.*dies/i.test(oracle)) csHit = true;
    if (themes.includes('graveyard') && /graveyard|reanimate|unearth|dredge|flashback|from your graveyard/i.test(oracle)) csHit = true;
    if (themes.includes('cast-trigger') && /whenever you cast/i.test(oracle)) csHit = true;
    if (themes.includes('death-trigger') && /whenever.*dies|morbid/i.test(oracle)) csHit = true;
    if (themes.includes('enchantments') && /enchant|constellation|whenever.*enchantment/i.test(oracle)) csHit = true;
    if (themes.includes('artifacts') && (/artifact/i.test(typeLine) || /artifact/i.test(oracle))) csHit = true;
    if (themes.includes('lifegain') && /you gain.*life|life.*gain|lifelink/i.test(oracle)) csHit = true;
    if (themes.includes('combat') && /attack|combat|deal.*combat damage|exalted|battle cry/i.test(oracle)) csHit = true;
    if (themes.includes('draw') && /draw a card|draw cards|card advantage/i.test(oracle)) csHit = true;
    if (themes.includes('poison') && /infect|toxic|poison|proliferate/i.test(oracle)) csHit = true;
    if (themes.includes('morph') && /morph|manifest|disguise|cloak|face.?down/i.test(oracle)) csHit = true;
    if (themes.includes('flash') && /flash|at instant speed|as though it had flash/i.test(oracle)) csHit = true;
    if (themes.includes('cycling') && /cycling|cycle/i.test(oracle)) csHit = true;
    if (themes.includes('copy') && /copy|clone/i.test(oracle)) csHit = true;

    // Shared keyword match
    if (!csHit) {
      if (cmdrKeywords.some(kw => cardKeywords.includes(kw) && kw !== 'flying')) csHit = true;
    }

    scores.cs = csHit ? 1 : 0;
    scores._reasons.cs = csHit
      ? `Directly supports ${cmdrData.name}'s strategy (themes: ${themes.filter(t => t.length > 2).slice(0, 4).join(', ')})`
      : `No direct mechanical synergy detected with ${cmdrData.name}`;
  } else {
    scores._reasons.cs = 'No commander provided — cannot evaluate synergy';
  }

  // ── DC (Dual-Category) ──
  // In standalone mode, estimate if the card naturally fits multiple framework roles
  let dcRoles = 0;
  if (/search your library for.*land|land.*onto the battlefield|add \{|add one mana|mana rock|treasure token/i.test(oracle) || /\{t\}:? add/i.test(oracle)) dcRoles++; // Ramp
  if (/draw a card|draw \d+ card|scry|surveil|impulse|exile.*top.*play/i.test(oracle)) dcRoles++; // Velocity
  if (/destroy target|exile target|counter target|deals? \d+ damage to.*creature|return.*to.*owner/i.test(oracle)) dcRoles++; // Interaction
  if (/destroy all|exile all|deals? \d+ damage to each creature|-\d+\/-\d+ until/i.test(oracle)) dcRoles++; // Wipe
  // SA roles — just check if it does something beyond the above
  if (/create.*token|whenever.*enters|whenever.*dies|whenever you cast|\+1\/\+1 counter|proliferate|sacrifice.*draw|sacrifice.*create/i.test(oracle)) dcRoles++;
  scores.dc = dcRoles >= 2 ? 1 : 0;
  scores._reasons.dc = dcRoles >= 2
    ? `Serves ${dcRoles} framework roles — multi-purpose card`
    : `Primarily serves a single role — look for modal or multi-purpose alternatives`;

  // ── WC (Web Connected) ──
  // In standalone mode, estimate based on mechanical breadth (how many common archetypes it connects to)
  const webHits = [];
  if (/landfall|whenever a land/i.test(oracle)) webHits.push('landfall');
  if (/create.*token/i.test(oracle)) webHits.push('tokens');
  if (/sacrifice/i.test(oracle)) webHits.push('sacrifice');
  if (/graveyard|from your graveyard/i.test(oracle)) webHits.push('graveyard');
  if (/whenever.*enters/i.test(oracle)) webHits.push('ETB');
  if (/whenever you cast/i.test(oracle)) webHits.push('spellcast');
  if (/whenever.*dies/i.test(oracle)) webHits.push('death');
  if (/draw a card/i.test(oracle)) webHits.push('draw');
  if (/search your library/i.test(oracle)) webHits.push('tutor');
  if (/\+1\/\+1 counter|proliferate/i.test(oracle)) webHits.push('counters');
  if (/treasure/i.test(oracle)) webHits.push('treasure');
  if (/artifact/i.test(typeLine)) webHits.push('artifact');
  if (/enchantment/i.test(typeLine)) webHits.push('enchantment');
  scores.wc = webHits.length >= 3 ? 1 : 0;
  scores._reasons.wc = webHits.length >= 3
    ? `Connects to ${webHits.length} mechanical themes (${webHits.slice(0, 4).join(', ')})`
    : webHits.length > 0
      ? `Touches ${webHits.length} theme(s) — in a full deck, WC checks for 5+ card-to-card connections`
      : 'Limited mechanical connections — may be isolated in most decks';

  // ── IV (Independent Value) ──
  // Does the card do something without the commander?
  if (/creature/i.test(typeLine)) {
    scores.iv = 0.5; // Can at least attack/block
    scores._reasons.iv = 'Creature body provides baseline value (0.5)';
  }
  if (/when.*enters.*draw|when.*enters.*create|when.*enters.*destroy|when.*enters.*exile/i.test(oracle)) {
    scores.iv = 1;
    scores._reasons.iv = 'ETB effect provides value regardless of commander';
  } else if (/draw a card|create.*token|destroy target|exile target|deals? \d+ damage|add \{|\{t\}:? add/i.test(oracle)) {
    scores.iv = 1;
    scores._reasons.iv = 'Self-contained effect — fully functional without commander';
  } else if (/planeswalker/i.test(typeLine)) {
    scores.iv = 1;
    scores._reasons.iv = 'Planeswalker — inherently independent value engine';
  } else if (/whenever|at the beginning/i.test(oracle) && scores.iv < 1) {
    scores.iv = Math.max(scores.iv, 0.5);
    scores._reasons.iv = 'Triggered ability provides partial value independently (0.5)';
  }
  if (scores.iv === 0) {
    scores._reasons.iv = 'May depend on specific board state or commander — low standalone value';
  }

  // ── TF (Temporal Fit) ──
  const cmdrMV = cmdrData ? (cmdrData.cmc || 5) : 5;
  if (cardMV <= cmdrMV + 1) {
    scores.tf = 1;
    scores._reasons.tf = `MV ${cardMV} fits within deployment window (commander MV ${cmdrMV} + 1)`;
  } else if (/without paying its mana cost|suspend|evoke|foretell|overload|emerge|convoke|delve|cascade/i.test(oracle)) {
    scores.tf = 1;
    scores._reasons.tf = `MV ${cardMV} is high but has alternate cost / deployment`;
  } else if (cardMV <= cmdrMV + 3 && /flash/i.test(oracle)) {
    scores.tf = 1;
    scores._reasons.tf = `Flash provides temporal flexibility despite MV ${cardMV}`;
  } else {
    scores._reasons.tf = `MV ${cardMV} exceeds deployment window (commander MV ${cmdrMV} + 1) — may be too slow`;
  }

  return scores;
}

// BUILD PLAN — Generated from commander in "Start from Scratch" flow
// ============================================================
function renderBuildPlan() {
  const app = $('#app');
  app.innerHTML = '';
  const container = el('div', { className: 'fade-in max-w-4xl mx-auto' });

  const cmdr = STATE.parsedCards.find(c => c.isCommander);
  const cmdrSD = cmdr ? STATE.scryfallData[cmdr.name] : null;

  // Header
  container.appendChild(el('h2', { className: 'font-cinzel text-2xl text-mtg-gold mb-1' }, ['Build Plan: ' + (cmdr?.name || 'Unknown')]));
  container.appendChild(el('p', { className: 'text-mtg-dim text-sm mb-6' }, ['Auto-generated blueprint based on your commander\'s mechanical identity.']));

  // Commander Card Display
  if (cmdrSD) {
    const cmdrCardSection = el('div', { className: 'mb-6 p-5 rounded-lg border border-mtg-gold/40 bg-mtg-panel' });
    cmdrCardSection.appendChild(el('h3', { className: 'font-cinzel text-lg text-mtg-gold mb-4' }, ['Commander Card']));

    const cmdrCardRow = el('div', { className: 'flex gap-4 items-start' });

    // Card image
    const imgUrl = cmdrSD.image_uris?.normal || (cmdrSD.card_faces?.[0]?.image_uris?.normal) || '';
    if (imgUrl) {
      const img = el('img', { src: imgUrl, className: 'w-48 rounded-lg shadow-lg' });
      cmdrCardRow.appendChild(img);
    }

    // Card details
    const cmdrDetails = el('div', { className: 'flex-1' });
    cmdrDetails.appendChild(el('div', { className: 'text-xl font-bold text-white mb-2' }, [cmdr.name]));

    // Color identity pips
    const colorPips = el('div', { className: 'flex gap-1 mb-3' });
    const colors = cmdrSD.color_identity || [];
    const colorMap = { W: 'white', U: 'blue', B: 'black', R: 'red', G: 'green' };
    const colorBG = { W: 'bg-yellow-100', U: 'bg-blue-400', B: 'bg-slate-600', R: 'bg-red-500', G: 'bg-green-600' };
    if (colors.length === 0) {
      colorPips.appendChild(el('div', { className: 'w-6 h-6 rounded-full bg-gray-500 border border-gray-400' }));
    } else {
      colors.forEach(c => {
        const pip = el('div', { className: `w-6 h-6 rounded-full border-2 border-white ${colorBG[c] || 'bg-gray-400'}` });
        colorPips.appendChild(pip);
      });
    }
    cmdrDetails.appendChild(colorPips);

    // Type line and MV
    cmdrDetails.appendChild(el('div', { className: 'text-sm text-mtg-dim mb-2' }, [`${cmdrSD.type_line}`]));
    cmdrDetails.appendChild(el('div', { className: 'text-xs text-mtg-gold font-semibold mb-3' }, [`Mana Value: ${cmdrSD.cmc || 0}`]));

    // Oracle text
    const oracleText = cmdrSD.oracle_text || (cmdrSD.card_faces ? cmdrSD.card_faces[0]?.oracle_text || '' : '');
    if (oracleText) {
      cmdrDetails.appendChild(el('div', { className: 'text-xs text-white bg-mtg-dark/50 p-3 rounded border border-mtg-border/50' }, [oracleText]));
    }

    cmdrCardRow.appendChild(cmdrDetails);
    cmdrCardSection.appendChild(cmdrCardRow);
    container.appendChild(cmdrCardSection);
  }

  // Detect signals and generate SA recommendations
  const cmdrOracle = cmdrSD ? (cmdrSD.oracle_text || (cmdrSD.card_faces ? cmdrSD.card_faces.map(f => f.oracle_text || '').join(' ') : '')).toLowerCase() : '';
  const cmdrKeywords = cmdrSD?.keywords?.map(k => k.toLowerCase()) || [];
  const cmdrTypeLine = cmdrSD ? (cmdrSD.type_line || '').toLowerCase() : '';
  const combined = cmdrOracle;

  // Detect which signals fire
  const detectedSignals = [];
  const saRoleCandidates = [];

  for (const [key, signal] of Object.entries(CMD_SIGNALS)) {
    if (signal.detect(combined, cmdrKeywords, cmdrTypeLine)) {
      detectedSignals.push(key);
      signal.roles.forEach(role => {
        saRoleCandidates.push({
          name: role.name,
          desc: role.desc,
          weight: role.weight,
          signalId: key
        });
      });
    }
  }

  // Sort by weight, deduplicate by name
  const byRoleName = {};
  saRoleCandidates.forEach(r => {
    if (!byRoleName[r.name] || byRoleName[r.name].weight < r.weight) {
      byRoleName[r.name] = r;
    }
  });
  let topRoles = Object.values(byRoleName).sort((a, b) => b.weight - a.weight).slice(0, 4);

  // Add Engine Insurance as 5th
  topRoles.push({
    name: UNIVERSAL_INSURANCE.name,
    desc: UNIVERSAL_INSURANCE.desc,
    weight: UNIVERSAL_INSURANCE.weight,
    signalId: 'universal'
  });

  // Derive engine name
  const engineName = detectedSignals.length > 0 ? deriveEngineName(detectedSignals) : 'Custom Engine';

  // Auto-fill character sheet (use original-case oracle text, not lowercased)
  const cmdrOracleOriginal = cmdrSD ? (cmdrSD.oracle_text || (cmdrSD.card_faces ? cmdrSD.card_faces.map(f => f.oracle_text || '').join(' ') : '')) : '';
  STATE.characterSheet.commanderName = cmdr.name;
  STATE.characterSheet.primaryAbility = cmdrOracleOriginal;
  STATE.characterSheet.axis = 'payoff'; // Default to Payoff, user can change
  STATE.characterSheet.threatLevel = 'variable'; // Default to Variable, user can change
  STATE.characterSheet.bracket = '3'; // Default to Bracket 3 (mid-powered), user can change
  STATE.characterSheet.saNames = topRoles.map(r => r.name);

  // Character Sheet Preview
  const csPreviewBox = el('div', { className: 'mb-6 p-5 rounded-lg border border-mtg-border bg-mtg-panel' });
  csPreviewBox.appendChild(el('h3', { className: 'font-cinzel text-lg text-mtg-gold mb-4' }, ['Auto-Filled Character Sheet']));

  const csPreviewGrid = el('div', { className: 'space-y-3' });

  // Engine name banner
  const engineBanner = el('div', { className: 'p-3 rounded bg-mtg-gold/20 border border-mtg-gold/60' });
  engineBanner.appendChild(el('div', { className: 'text-xs text-mtg-gold font-semibold mb-1' }, ['Detected Engine']));
  engineBanner.appendChild(el('div', { className: 'text-lg font-cinzel text-mtg-gold' }, [engineName]));
  csPreviewGrid.appendChild(engineBanner);

  // Detected signals
  if (detectedSignals.length > 0) {
    const signalsDiv = el('div', { className: 'p-3 rounded bg-mtg-panel border border-mtg-border' });
    signalsDiv.appendChild(el('div', { className: 'text-xs text-mtg-gold font-semibold mb-2' }, ['Detected Signals']));
    const signalsList = el('div', { className: 'flex flex-wrap gap-2' });
    detectedSignals.forEach(sig => {
      const sigName = sig.split(/(?=[A-Z])/).join(' ');

  const tips = [];
  if (detectedSignals.includes('cascadeFreecast')) {
    tips.push('Stack your deck with impactful spells at varied mana values — cascade rewards a diverse mana curve.');
  }
  if (detectedSignals.includes('sacrifice')) {
    tips.push('Prioritize recursive creatures that return from the graveyard — your engine needs a steady supply of fodder.');
  }
  if (detectedSignals.includes('spellcastTrigger') || detectedSignals.includes('spellCopy')) {
    tips.push('Card draw is critical to keep the spell chain fueled. Include multiple wheels and cantrips to refund your mana investment.');
  }
  if (detectedSignals.includes('etbDoubling') || detectedSignals.includes('etbTrigger')) {
    tips.push('Flicker and bounce effects amplify your commander\'s value. Include blink sources to generate additional triggers.');
  }
  if (detectedSignals.includes('tokenCreation')) {
    tips.push('Token generators are the engine\'s fuel. Prioritize effects that create multiple tokens or scale with your commander.');
  }
  if (detectedSignals.includes('poisonInfect')) {
    tips.push('Poison only needs 10 counters to win. Focus on evasion and proliferate rather than raw power — one unblocked infect creature plus proliferate can close games fast.');
  }
  if (detectedSignals.includes('equipmentMatters')) {
    tips.push('Free equip effects like Sigarda\'s Aid and Puresteel Paladin are force multipliers. Every equipment that auto-attaches saves you tempo.');
  }
  if (detectedSignals.includes('voltronSolo')) {
    tips.push('Voltron lives and dies by commander protection. Double up on totem armor, hexproof auras, and indestructible — losing your suited-up commander is devastating.');
  }
  if (detectedSignals.includes('morphManifest')) {
    tips.push('Morph creatures all cost 3 to play face-down — your ramp package should hit the 3-mana threshold early. Cost reducers like Kadena turn morphs into free spells.');
  }
  if (detectedSignals.includes('cyclingMatters')) {
    tips.push('Cycling cards do double duty — they trigger your commander AND replace themselves. Prioritize cheap cycling costs over the card\'s castable mode.');
  }
  if (detectedSignals.includes('deathTrigger')) {
    tips.push('Death trigger decks want creatures that die profitably. Tokens, creatures with afterlife/persist/undying, and sacrifice outlets ensure a steady stream of death triggers.');
  }
  if (detectedSignals.includes('clonesCopy')) {
    tips.push('Clone effects scale with the best creature on the board — yours or an opponent\'s. Include high-value ETB creatures to maximize your own clone targets.');
  }
  if (detectedSignals.includes('flashMoment')) {
    tips.push('Flash turns every opponent\'s end step into your main phase. Hold up mana for interaction, then deploy threats if no response is needed.');
  }
  if (detectedSignals.includes('artifactSynergy')) {
    tips.push('Cheap artifacts (0-2 mana) fuel artifact-matters commanders. Treasure/Clue/Food token generators provide both artifacts and secondary value.');
  }
  if (detectedSignals.includes('landfallTrigger')) {
    tips.push('Extra land drops are your engine\'s turbo button. Exploration, Burgeoning, and fetchlands that sacrifice for two landfall triggers are premium.');
  }
  if (detectedSignals.includes('countersSynergy')) {
    tips.push('Doubling Season and proliferate effects scale exponentially with counters. Even one extra proliferate per turn compounds rapidly.');
  }
  if (detectedSignals.includes('graveyardMatters')) {
    tips.push('Self-mill is ramp for graveyard decks. Cards like Satyr Wayfinder and Stitcher\'s Supplier fill your yard while developing your board.');
  }
  tips.push('Your commander is the engine — always include protection in the Engine Insurance category.');

  const tipsList = el('ul', { className: 'space-y-2' });
  tips.slice(0, 3).forEach(tip => {
    tipsList.appendChild(el('li', { className: 'text-sm text-mtg-dim flex gap-2' }, [

    onClick: () => {
      const blueprint = `Build Plan for ${cmdr.name}
Engine: ${engineName}
${detectedSignals.length > 0 ? 'Signals: ' + detectedSignals.join(', ') + '\n' : ''}
Category Targets:
- Ramp: 10–12
- Velocity: 10–12
- Interaction: 8–10
- Wipes: 3–4
- Lands: 35–38
${topRoles.map(r => `- ${r.name}: ${r.name === 'Engine Insurance' ? '4–6' : (r.weight >= 2 ? '8–12' : '6–10')}`).join('\n')}

Build Tips:
${tips.slice(0, 3).map(t => '- ' + t).join('\n')}`;
      navigator.clipboard.writeText(blueprint).then(() => {

  // Continue to Full Audit Button

  // Start Over Button
  const resetBtn = el('button', {
    className: 'px-5 py-2 rounded border border-mtg-border text-mtg-dim hover:text-white hover:border-mtg-gold transition',
    onClick: () => {
      STATE.scryfallData = {};
      STATE.parsedCards = [];
      STATE.buildPlanMode = false;
      STATE.step = 0;
      render();
    }
  }, ['Start Over']);

  actionBtns.appendChild(resetBtn);
  actionBtns.appendChild(copyBtn);
  actionBtns.appendChild(continueBtn);
  container.appendChild(actionBtns);

  app.appendChild(container);
}

// ============================================================
// AI ASSIST — Auto-fill Character Sheet from commander signals
// ============================================================
function aiAssistCharacterSheet(cmdrSD, cs) {
  const cmdrOracle = (cmdrSD.oracle_text || (cmdrSD.card_faces ? cmdrSD.card_faces.map(f => f.oracle_text || '').join(' ') : '')).toLowerCase();
  const cmdrOracleOriginal = cmdrSD.oracle_text || (cmdrSD.card_faces ? cmdrSD.card_faces.map(f => f.oracle_text || '').join(' ') : '');
  const cmdrKeywords = cmdrSD.keywords?.map(k => k.toLowerCase()) || [];
  const cmdrTypeLine = (cmdrSD.type_line || '').toLowerCase();

  // Detect which signals fire
  const detectedSignals = [];
  const saRoleCandidates = [];

  for (const [key, signal] of Object.entries(CMD_SIGNALS)) {
    if (signal.detect(cmdrOracle, cmdrKeywords, cmdrTypeLine)) {
      detectedSignals.push(key);
      signal.roles.forEach(role => {
        saRoleCandidates.push({ name: role.name, desc: role.desc, weight: role.weight, signalId: key });
      });
    }
  }

  // Sort by weight, deduplicate by name, take top 4
  const byRoleName = {};
  saRoleCandidates.forEach(r => {
    if (!byRoleName[r.name] || byRoleName[r.name].weight < r.weight) byRoleName[r.name] = r;
  });
  let topRoles = Object.values(byRoleName).sort((a, b) => b.weight - a.weight).slice(0, 4);
  topRoles.push({ name: UNIVERSAL_INSURANCE.name, desc: UNIVERSAL_INSURANCE.desc, weight: UNIVERSAL_INSURANCE.weight, signalId: 'universal' });

  // Derive engine name
  const engineName = detectedSignals.length > 0 ? deriveEngineName(detectedSignals) : 'Custom Engine';

  // Fill the character sheet
  cs.primaryAbility = cmdrOracleOriginal;
  cs.axis = 'payoff';
  cs.threatLevel = 'variable';
  if (!cs.bracket) cs.bracket = '3';
  cs.saNames = topRoles.map(r => r.name);
  cs.sa = topRoles.map(r => r.desc);

  // Store engine info for display
  STATE._detectedEngine = { name: engineName, signals: detectedSignals };

  return { engineName, signals: detectedSignals, topRoles };
}

  } else if (cmdr) {

    cmdrFields.appendChild(el('div', { className: 'text-xs text-yellow-400' }, ['(Not found on Scryfall — check spelling on Step 1)']));
  } else {
    cmdrFields.appendChild(el('div', { className: 'text-lg font-bold text-yellow-400' }, ['No commander detected']));
    cmdrFields.appendChild(el('div', { className: 'text-xs text-mtg-dim' }, ['Go back to Step 1 and enter your commander name in the Commander box.']));
  }

  // If there were multiple commander candidates from fuzzy search, show a picker
  if (STATE.cmdrCandidates && STATE.cmdrCandidates.length > 1) {
    const ambigBox = el('div', { className: 'mt-3 p-3 rounded border border-yellow-500/30 bg-yellow-500/5' });
    ambigBox.appendChild(el('div', { className: 'text-xs font-semibold text-yellow-400 mb-2' }, ['Multiple commanders match — which one is yours?']));
    const candGrid = el('div', { className: 'flex gap-3 flex-wrap' });
    STATE.cmdrCandidates.forEach(cand => {
      const isSelected = cmdr && cmdr.name === cand.name;
      const candBtn = el('div', {
        className: `rounded-lg border-2 p-2 cursor-pointer transition text-center ${isSelected ? 'border-mtg-gold bg-mtg-gold/10' : 'border-mtg-border hover:border-mtg-dim'}`,
        onClick: () => {
          STATE.parsedCards.forEach(c => c.isCommander = false);
          const existing = STATE.parsedCards.find(c => c.name === cand.name);
          if (existing) { existing.isCommander = true; }
          else { STATE.parsedCards.unshift({ qty: 1, name: cand.name, isCommander: true }); }
          STATE.scryfallData[cand.name] = cand;
          cs.commanderName = cand.name;
          STATE.cmdrCandidates = null; // Clear after selection
          render();
        }

      const img = cand.image_uris?.small || (cand.card_faces?.[0]?.image_uris?.small) || '';

  // "Wrong commander?" — collapsible dropdown to change it

    className: 'text-xs text-mtg-dim hover:text-mtg-gold underline mt-2 cursor-pointer',
    onClick: () => {

      cmdrSelect.appendChild(el('option', { value: '' }, ['— Choose a card —']));

      // Show legendary creatures first, then everything else
      const legendaries = STATE.parsedCards.filter(c => {
        const sd = STATE.scryfallData[c.name];
        return sd?.type_line && /legendary creature/i.test(sd.type_line);
      });
      const others = STATE.parsedCards.filter(c => {
        const sd = STATE.scryfallData[c.name];
        return !sd?.type_line || !/legendary creature/i.test(sd.type_line);
      });

      if (legendaries.length > 0) {
        const grp1 = el('optgroup', { label: 'Legendary Creatures' });

          const sd = STATE.scryfallData[c.name];
          grp1.appendChild(el('option', { value: c.name }, [c.name + (sd ? ` (MV ${sd.cmc})` : '')]));

      const result = aiAssistCharacterSheet(cmdrSD, cs);
      // Show engine result
      const resultArea = aiAssistBox.querySelector('.ai-assist-result');
      if (resultArea) resultArea.remove();
      const resultEl = el('div', { className: 'ai-assist-result mt-3 p-3 rounded bg-mtg-dark/50 border border-mtg-gold/30' });
      resultEl.innerHTML = `<div class="text-xs text-mtg-gold font-semibold mb-1">Engine Detected: <span class="text-white">${result.engineName}</span></div>`
        + `<div class="text-xs text-mtg-dim mb-2">${result.signals.length} signal${result.signals.length !== 1 ? 's' : ''} detected: ${result.signals.map(s => s.split(/(?=[A-Z])/).join(' ')).join(', ')}</div>`
        + `<div class="text-xs text-mtg-dim">Character sheet auto-filled with engine type, axis, bracket, and 5 SA categories. Review and adjust as needed.</div>`;
      aiAssistBox.appendChild(resultEl);
      render();
    }
  }, ['AI Assist — Auto-Fill from Commander']);
  const aiAssistDesc = el('div', { className: 'flex-1 min-w-0' });
  aiAssistDesc.appendChild(el('div', { className: 'text-xs text-mtg-dim' }, ['Analyzes your commander\'s oracle text to detect mechanical signals, derive the engine type, and recommend all 5 secondary abilities.']));
  aiAssistRow.appendChild(aiAssistBtn);
  aiAssistRow.appendChild(aiAssistDesc);
  aiAssistBox.appendChild(aiAssistRow);
  form.appendChild(aiAssistBox);

  // Also keep the deck-analysis suggest button for users who have imported a deck
  if (STATE.parsedCards.length > 2) {
    const suggestBtn = el('button', {
      className: 'mb-3 px-4 py-2 rounded border border-mtg-border text-mtg-dim text-xs hover:text-mtg-gold hover:border-mtg-gold/50 transition',
      onClick: () => {
        const suggestions = suggestSecondaryAbilities();
        suggestions.forEach((s, i) => {
          if (!cs.saNames[i]) cs.saNames[i] = s.name;
          if (!cs.sa[i]) cs.sa[i] = s.desc;
        });
        render();
      }
    }, ['Analyze Deck Cards & Refine SAs']);
    form.appendChild(suggestBtn);
  }

  // Show engine detection status — tells the user we recognized their commander's archetype
  const detectedEngine = STATE._detectedEngine;
  if (detectedEngine && detectedEngine.name) {
    const engineBanner = el('div', { className: 'mb-3 p-2.5 rounded-lg border border-mtg-gold/30 bg-mtg-gold/5 text-xs' });
    const signalCount = detectedEngine.signals ? detectedEngine.signals.length : 0;
    engineBanner.innerHTML = `<span class="text-mtg-gold font-semibold">Engine Detected:</span> <span class="text-white">${detectedEngine.name}</span>`
      + (signalCount > 1 ? ` <span class="text-mtg-dim">(${signalCount} mechanical signals)</span>` : '') + `<br>`
      + `<span class="text-mtg-dim">SA suggestions are tailored to your commander's strategic needs — roles describe WHY cards serve the engine, not just keywords.</span>`;
    form.appendChild(engineBanner);
  }

  for (let i = 0; i < 5; i++) {
    const row = el('div', { className: 'flex gap-2 mb-2 items-center' });
    const colorDot = el('div', { className: 'w-4 h-4 rounded-full flex-shrink-0', style: `background:${CAT_COLORS['SA-'+(i+1)]}` });
    const numLabel = el('div', { className: 'text-xs text-mtg-dim w-4 flex-shrink-0' }, [String(i+1)]);
    const nameIn = el('input', { className: 'w-36 rounded border px-2 py-1.5 text-sm font-semibold', placeholder: `Name (e.g., Protection)`, value: cs.saNames[i] });
    nameIn.addEventListener('input', e => { cs.saNames[i] = e.target.value; });
    const descIn = el('input', { className: 'flex-1 rounded border px-2 py-1.5 text-sm', placeholder: `What cards go here? (e.g., "Hexproof, indestructible, phase out")`, value: cs.sa[i] });
    descIn.addEventListener('input', e => { cs.sa[i] = e.target.value; });
    row.appendChild(colorDot);
    row.appendChild(numLabel);
    row.appendChild(nameIn);
    row.appendChild(descIn);
    form.appendChild(row);
  }

  container.appendChild(form);

  // Feedback
  container.appendChild(makeFeedbackBox('character', 'How does the Character Sheet feel? Is anything confusing or missing?'));

  container.appendChild(navButtons(true, true));
  app.appendChild(container);
}
